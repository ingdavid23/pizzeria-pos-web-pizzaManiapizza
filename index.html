        function showCloseCashModal() {
            const cr = state.cashRegister;
            const cashSales = cr.movements.filter(m => m.type === 'sale' && m.paymentMethod === 'cash').reduce((sum, m) => sum + m.amount, 0);
            const totalExpenses = cr.movements.filter(m => m.type === 'expense').reduce((sum, m) => sum + Math.abs(m.amount), 0);
            
            // FÓRMULA CORREGIDA: Fondo + Ventas en efectivo - Gastos
            const expectedCash = cr.initialAmount + cashSales - totalExpenses;

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-md animate-slideIn shadow-2xl border-2 border-white">
                    <h3 class="text-xl font-bold mb-4 text-theme-greenDark">🔒 Corte de Caja</h3>
                    <div class="space-y-4">
                        <div class="p-4 rounded-xl bg-theme-bg border border-theme-beige text-center">
                            <p class="text-sm font-bold text-theme-textMuted">Efectivo esperado en caja (Ya resta gastos)</p>
                            <p class="text-3xl font-extrabold text-theme-greenDark mt-1">$${expectedCash.toLocaleString()}</p>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-theme-text">Efectivo contado físico</label>
                            <input type="number" id="countedCash" class="w-full px-4 py-3 bg-white border-2 border-theme-beige rounded-xl text-2xl text-center focus:outline-none focus:border-theme-green font-bold text-theme-text" 
                                placeholder="0" oninput="calculateDifference(${expectedCash})">
                        </div>
                        <div id="differenceDisplay" class="p-4 rounded-xl bg-theme-bg border border-theme-beige hidden text-center">
                            <p class="text-sm font-bold text-theme-textMuted">Diferencia</p>
                            <p id="differenceAmount" class="text-2xl font-extrabold mt-1"></p>
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-bold text-theme-text">Cancelar</button>
                            <button onclick="closeCashRegister(${expectedCash})" class="bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-bold shadow-md transition">Cerrar Caja</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        
        function calculateDifference(expected) {
            const counted = parseFloat(document.getElementById('countedCash').value) || 0;
            const diff = counted - expected;
            const display = document.getElementById('differenceDisplay');
            const amount = document.getElementById('differenceAmount');

            display.classList.remove('hidden');
            amount.textContent = `${diff >= 0 ? '+' : ''}$${diff.toLocaleString()}`;
            amount.className = `text-2xl font-extrabold mt-1 ${diff === 0 ? 'text-green-600' : 'text-red-600'}`;
        }

        function closeCashRegister(expected) {
            const counted = parseFloat(document.getElementById('countedCash').value) || 0;
            const difference = counted - expected;

            // 1. Guardar el movimiento en Firebase
            state.cashRegister.movements.push({
                type: 'close',
                amount: counted,
                expected,
                difference,
                timestamp: new Date().toISOString()
            });

            logActivity('CASH_CLOSE', `Caja cerrada. Esperado: $${expected}, Contado: $${counted}, Diferencia: $${difference}`);
            state.cashRegister.isOpen = false;
            saveToStorage();
            
            showToast(`Caja cerrada. Diferencia: $${difference}`, difference === 0 ? 'success' : 'warning');
            closeModal();
            renderCashRegister(document.getElementById('contentArea'));

            // ==============================================================
            // 2. MAGIA: ENVÍO DE REPORTE AUTOMÁTICO POR WHATSAPP
            // ==============================================================
            const whatsappNumber = state.settings?.ownerWhatsApp;
            
            if (whatsappNumber) {
                // Obtener el nombre de la sucursal actual
                let branchName = "Sucursal Principal";
                if (currentBranch !== 'sucursal_principal') {
                    branchName = currentBranch.replace('sucursal_', '').toUpperCase();
                }

                const today = new Date().toLocaleDateString('es-MX');
                const time = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
                
                // Armar el mensaje con formato (Negritas y Emojis)
                let msg = `*📊 CORTE DE CAJA - PizzaManía*\n`;
                msg += `📍 Sucursal: *${branchName}*\n`;
                msg += `👤 Cajero: *${currentUser.name}*\n`;
                msg += `📅 Fecha: ${today} a las ${time}\n\n`;
                msg += `💵 *Efectivo Esperado:* $${expected.toLocaleString()}\n`;
                msg += `🤲 *Efectivo Entregado:* $${counted.toLocaleString()}\n\n`;
                
                if (difference === 0) {
                    msg += `✅ *ESTADO:* Caja Cuadrada Perfecto ($0)\n`;
                } else if (difference > 0) {
                    msg += `⚠️ *ESTADO:* Sobraron $${Math.abs(difference).toLocaleString()}\n`;
                } else {
                    msg += `❌ *ESTADO:* Faltaron $${Math.abs(difference).toLocaleString()}\n`;
                }
                
                // Transformar el texto para que la URL lo entienda
                const encodedMsg = encodeURIComponent(msg);
                const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodedMsg}`;
                
                // Abre WhatsApp Web o la App en una nueva pestaña
                window.open(whatsappUrl, '_blank');
            }
        }

        function saveExpense() {
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const desc = document.getElementById('expenseDesc').value.trim();

            if (isNaN(amount) || amount <= 0) {
                showToast('Ingresa un monto válido mayor a 0', 'warning'); return;
            }
            if (!desc) {
                showToast('Ingresa el motivo del gasto', 'warning'); return;
            }

            // 1. Guardar en el historial de la Caja Actual
            state.cashRegister.movements.push({
                type: 'expense',
                amount: amount,
                description: desc,
                timestamp: new Date().toISOString()
            });

            // 2. Guardar en el Registro Global de Egresos (Para Reportes Mensuales)
            if (!state.expenses) state.expenses = [];
            state.expenses.push({
                id: Date.now(),
                amount: amount,
                description: desc,
                timestamp: new Date().toISOString(),
                userId: currentUser.id,
                userName: currentUser.name
            });

            logActivity('EXPENSE_ADD', `Retiro de caja: $${amount} por ${desc}`);
            saveToStorage();
            
            showToast('Gasto registrado y descontado de caja', 'success');
            closeModal();
            renderCashRegister(document.getElementById('contentArea')); // Refresca la vista
        }



      // ==================== ORDERS MODULE (CON CALENDARIO CORREGIDO) ====================
      function renderOrders(container) {
            // 🛡️ MAGIA: Convertir fechas a la zona horaria local exacta para que coincida con el calendario
            const getLocalYYYYMMDD = (dateObj) => {
                const d = new Date(dateObj);
                if (isNaN(d)) return "";
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            };

            const todayLocalStr = getLocalYYYYMMDD(new Date());

            // Si no hay fecha elegida, mostrar Hoy
            if (typeof window.selectedOrdersDate === 'undefined' || !window.selectedOrdersDate) {
                window.selectedOrdersDate = todayLocalStr; 
            }

            const targetDateStr = window.selectedOrdersDate;

            // Filtramos comparando el día, mes y año exactos de la localidad
            const activeOrders = state.orders.filter(o => {
                if (!o.createdAt) return false;
                const orderDateStr = getLocalYYYYMMDD(o.createdAt);
                return orderDateStr === targetDateStr && o.status !== 'cancelled';

            container.innerHTML = `

                            : ''}

                    </div>
                    
                    <div class="space-y-4">
                        ${activeOrders.map(order => `

                                    <div class="flex items-center gap-3 flex-wrap">
                                        <span class="text-xl font-extrabold text-theme-text">#${order.id.toString().slice(-4)}</span>

                                        <span class="px-3 py-1 rounded-full text-xs font-bold shadow-sm ${getStatusClass(order.status)}">${getStatusLabel(order.status)}</span>
                                        
                                        <span class="px-3 py-1 rounded-full text-xs font-bold shadow-sm ${order.paymentStatus === 'paid' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">

                                    <div class="text-left md:text-right">

                                        <p class="text-xs font-bold text-theme-textMuted mt-1">🕒 ${new Date(order.createdAt).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })}</p>

        // ==================== ELIMINACIÓN SEGURA DE PEDIDOS (ADMIN) ====================
        function showDeleteOrderAuthModal(orderId) {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-[95%] max-w-md animate-slideIn shadow-2xl border-2 border-red-400 text-center">
                    <div class="text-5xl mb-4 drop-shadow-md">🛡️</div>
                    <h3 class="text-xl font-extrabold mb-2 text-red-600">Autorización Requerida</h3>
                    <p class="text-sm text-theme-text font-medium mb-6">Para eliminar este pedido por completo de Cocina, Ventas y Reportes, ingresa la clave de administrador.</p>
                    
                    <div class="mb-6 relative">
                        <input type="password" id="adminAuthPassword" class="w-full px-4 py-3 bg-white border-2 border-red-200 rounded-xl text-center text-2xl tracking-widest focus:outline-none focus:border-red-500 font-bold pr-12" placeholder="******">
                        <button type="button" onclick="togglePasswordVisibility('adminAuthPassword', 'adminAuthPassIcon')" class="absolute inset-y-0 right-0 px-4 flex items-center text-xl text-red-400 hover:text-red-600 transition focus:outline-none">
                            <span id="adminAuthPassIcon">👁️</span>
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="closeModal()" class="py-3 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-bold text-theme-text shadow-sm">Cancelar</button>
                        <button onclick="executeDeleteOrder(${orderId})" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-md transition">Destruir Pedido</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('adminAuthPassword').focus(), 100);
        }

        function executeDeleteOrder(orderId) {
            const pwdInput = document.getElementById('adminAuthPassword').value;
            
            // Verificación de la clave maestra solicitada
            if (pwdInput !== '726188') {
                showToast('Contraseña incorrecta', 'error');
                const inputEl = document.getElementById('adminAuthPassword');
                inputEl.classList.add('animate-shake', 'border-red-500');
                setTimeout(() => inputEl.classList.remove('animate-shake'), 500);
                return;
            }

            // 1. Restaurar Inventario y Liberar Mesa para que no quede basura operativa
            const orderToRest = state.orders.find(o => o.id === orderId);
            if (orderToRest) {
                // Liberar la mesa
                if (orderToRest.tableId && orderToRest.status !== 'delivered' && orderToRest.status !== 'cancelled') {
                    const table = state.tables.find(t => t.id === orderToRest.tableId);
                    if (table) table.status = 'available';
                }
                
                // Devolver insumos al stock general
                orderToRest.items.forEach(cartItem => {
                    const product = state.products.find(p => p.id === cartItem.productId);
                    if (product && product.ingredients) {
                        product.ingredients.forEach(ing => {
                            const invItem = state.inventory.find(i => i.id === ing.id);
                            if (invItem) invItem.stock += (ing.qty * cartItem.quantity);
                        });
                    }
                });
            }

            // 2. Erradicar de la lista de Pedidos (Lo desaparece de Cocina y Meseros)
            state.orders = state.orders.filter(o => o.id !== orderId);

            // 3. Erradicar de la matriz de Ventas (Lo desaparece de las Estadísticas y Reportes)
            state.sales = state.sales.filter(s => s.orderId !== orderId);

            // 4. Erradicar movimientos de caja asociados a este ticket
            if (state.cashRegister && state.cashRegister.movements) {
                state.cashRegister.movements = state.cashRegister.movements.filter(m => m.orderId !== orderId);
            }

            // 5. Guardar y Notificar
            logActivity('ORDER_DELETED', `Pedido #${orderId.toString().slice(-4)} eliminado totalmente con clave Admin`);
            saveToStorage();
            
            showToast('✅ Pedido erradicado de todas las bases de datos', 'success');
            closeModal();
            renderOrders(document.getElementById('contentArea')); // Refresca la pantalla
        }

        // ==================== EXISTING ORDER PAYMENT LOGIC ====================
// ==================== MOTOR DE PAGOS PARCIALES Y MIXTOS ====================
function payExistingOrder(orderId, method) {

            showOrderPaymentModal(order, method);
        }

        function calculatePartialChange(remaining, method) {
            const paymentInputEl = document.getElementById('partialPaymentAmount');
            let amountToPay = parseFloat(paymentInputEl.value) || 0;
            const confirmBtn = document.getElementById('confirmOrderPaymentBtn');

            // Seguridad: No permitir que anote un pago mayor al restante
            if (amountToPay > remaining) {
                paymentInputEl.value = remaining;
                amountToPay = remaining;
            }

            if (method === 'cash') {
                const received = parseFloat(document.getElementById('orderCashReceived').value) || 0;
                const change = received - amountToPay;
                const changeDisplay = document.getElementById('orderChangeDisplay');
                const changeAmount = document.getElementById('orderChangeAmount');

                if (received >= amountToPay && amountToPay > 0) {
                    changeDisplay.classList.remove('hidden');
                    changeAmount.textContent = change.toLocaleString();
                    confirmBtn.disabled = false;
                } else {
                    changeDisplay.classList.add('hidden');
                    confirmBtn.disabled = true;
                }
            } else {
                // En transferencia, solo asegurar que ponga un monto válido
                confirmBtn.disabled = amountToPay <= 0;
            }
        }

        // ==================== MOTOR DE PAGOS PARCIALES Y MIXTOS ====================
        function processPartialPayment(orderId, method) {
            // Escudo anti doble clic
            const btn = document.getElementById('confirmOrderPaymentBtn');
            if (btn && btn.getAttribute('data-processing') === 'true') return;
            
            if (btn) {
                btn.setAttribute('data-processing', 'true');
                btn.innerHTML = '⏳ Procesando...';
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            let order;

            // 💡 SOLUCIÓN: Si detectamos que es una orden nueva de mostrador, LA CREAMOS REALMENTE AQUÍ.
            if (orderId === 'new_counter') {
                const total = calculateCartTotal();
                const newOrderId = Date.now();
                
                order = {
                    id: newOrderId,
                    type: 'counter',
                    items: [...currentCart],
                    total: total,
                    status: 'pending', // Va a cocina
                    paymentMethod: null,
                    paymentStatus: 'pending',
                    paidAmount: 0,
                    payments: [],
                    createdAt: new Date().toISOString(),
                    createdBy: currentUser.id,
                    tableId: null
                };

                // Descontar inventario AHORA SÍ
                currentCart.forEach(cartItem => {
                    const product = state.products.find(p => p.id === cartItem.productId);
                    if (product && product.ingredients) {
                        product.ingredients.forEach(ing => {
                            const invItem = state.inventory.find(i => i.id === ing.id);
                            if (invItem) {
                                invItem.stock -= (ing.qty * cartItem.quantity);
                                if (invItem.stock <= invItem.minStock) {
                                    try { addNotification('warning', `⚠️ Stock bajo: ${invItem.name}`, ['admin', 'cashier']); } catch(e){}
                                }
                            }
                        });
                    }
                });
                checkProductAvailability();

                state.orders.push(order);
                try { addNotification('info', `Nuevo pedido #${newOrderId.toString().slice(-4)}`, ['kitchen']); } catch(e){}
                logActivity('ORDER_CREATE', `Pedido #${newOrderId.toString().slice(-4)} creado por $${total}`);

                // Limpiamos el carrito visual
                currentCart = [];
                updateCartDisplay();
            } else {
                // Si viene de una Mesa, simplemente la buscamos en la base de datos
                order = state.orders.find(o => String(o.id) === String(orderId));
            }

            if (!order) return;

            const amountToPay = parseFloat(document.getElementById('partialPaymentAmount').value) || 0;
            let received = amountToPay;
            let change = 0;

            if (method === 'cash') {
                received = parseFloat(document.getElementById('orderCashReceived').value) || 0;
                change = received - amountToPay;
            }

            // Inicializar estructuras de pagos
            if (!order.paidAmount) order.paidAmount = 0;
            if (!order.payments) order.payments = [];

            // 1. Guardar el abono individual en la orden
            order.payments.push({
                method: method,
                amount: amountToPay,
                received: received,
                change: change,
                timestamp: new Date().toISOString(),
                cashierName: currentUser.name
            });

            order.paidAmount += amountToPay;

            // 2. Guardar el movimiento físico en la Caja
            if (state.cashRegister.isOpen) {
                state.cashRegister.movements.push({
                    type: 'sale',
                    amount: amountToPay,
                    paymentMethod: method,
                    orderId: order.id,
                    timestamp: new Date().toISOString(),
                    description: `Abono a Ticket #${order.id.toString().slice(-4)}`
                });
            }

            logActivity('SALE_PARTIAL', `Abono a pedido #${order.id.toString().slice(-4)} por $${amountToPay} - ${method}`);

            // 3. Evaluar si la cuenta quedó saldada a $0
            if (order.paidAmount >= order.total) {
                order.paymentStatus = 'paid';
                // Etiquetamos como mixto si combinaron pagos
                order.paymentMethod = order.payments.length > 1 ? 'mixed' : method; 

                // Convertirlo en Venta Oficial
                const sale = {
                    id: Date.now(),
                    orderId: order.id,
                    items: [...order.items],
                    subtotal: order.total,
                    total: order.total,
                    paymentMethod: order.paymentMethod,
                    paymentsBreakdown: order.payments,
                    timestamp: new Date().toISOString(),
                    cashierId: currentUser.id,
                    cashierName: currentUser.name
                };
                
                // 🚀 NUEVA ARQUITECTURA: Lo mandamos directo a su carpeta infinita
                saveSaleToCloud(sale);
                
                // Lo dejamos temporalmente en la memoria visual para que la pantalla no parpadee
                if (!state.sales) state.sales = [];
                state.sales.push(sale);

                saveToStorage();
                showToast('✅ Cuenta liquidada por completo', 'success');
                closeModal();
                renderView(currentView);
                showReceipt(sale);

            } else {
                // ... (el resto del código del else se queda igual)
                // Aún debe dinero (Abono Parcial Exitoso)
                const remaining = order.total - order.paidAmount;
                saveToStorage();
                showToast(`✅ Abono guardado. Restan por pagar: $${remaining}`, 'info');
                closeModal();
                renderView(currentView);
                
                // Si el mesero está viendo la mesa, le refrescamos el modal de la mesa
                if (currentView === 'waiter' && selectedTable) {
                    selectTable(selectedTable);
                }
            }
        }

        // ==================== VARIABLES PARA LA GRÁFICA ====================
        let reportChartMode = 'weekly';

        let salesChartInstance = null; // Guarda la gráfica para poder destruirla y redibujarla

        // ==================== REPORTS MODULE ====================
        function renderReports(container) {

        // --- FUNCIONES DINÁMICAS PARA LA GRÁFICA ---
        function updateMonthLabel() {
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const labelEl = document.getElementById('currentMonthLabel');
            if (labelEl) {
                labelEl.textContent = `${monthNames[reportSelectedMonth]} ${reportSelectedYear}`;
            }
        }

        function changeChartMode(mode) {
            reportChartMode = mode;
            const navControls = document.getElementById('monthNavControls');
            if (mode === 'monthly') {
                navControls.classList.remove('hidden');
                navControls.classList.add('flex');
                updateMonthLabel();
            } else {
                navControls.classList.add('hidden');
                navControls.classList.remove('flex');
            }
            updateSalesChart();
        }

        function navigateMonth(direction) {
            reportSelectedMonth += direction;
            if (reportSelectedMonth < 0) {
                reportSelectedMonth = 11;
                reportSelectedYear--;
            } else if (reportSelectedMonth > 11) {
                reportSelectedMonth = 0;
                reportSelectedYear++;
            }
            updateMonthLabel();
            updateSalesChart();
        }

        function updateSalesChart() {
            const ctx = document.getElementById('salesChart');
            if(!ctx) return;

            let labels = [];
            let chartData = [];

            if (reportChartMode === 'weekly') {
                // Cálculo de los últimos 7 días
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const last7Days = [...Array(7)].map((_, i) => {
                    const d = new Date(today);
                    d.setDate(d.getDate() - (6 - i));
                    return d;
                });
                
                labels = last7Days.map(d => d.toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric' }));
                chartData = last7Days.map(date => {
                    return state.sales
                        .filter(s => {
                            const sd = new Date(s.timestamp);
                            return sd.getFullYear() === date.getFullYear() && sd.getMonth() === date.getMonth() && sd.getDate() === date.getDate();
                        })
                        .reduce((sum, s) => sum + s.total, 0);
                });
            } else {
                // Cálculo Mensual (Día por día del mes seleccionado)
                const daysInMonth = new Date(reportSelectedYear, reportSelectedMonth + 1, 0).getDate();
                for (let i = 1; i <= daysInMonth; i++) {
                    labels.push(i.toString()); // Solo ponemos el número del día (1, 2, 3...)
                    
                    const dailyTotal = state.sales
                        .filter(s => {
                            const sd = new Date(s.timestamp);
                            return sd.getFullYear() === reportSelectedYear && sd.getMonth() === reportSelectedMonth && sd.getDate() === i;
                        })
                        .reduce((sum, s) => sum + s.total, 0);
                    chartData.push(dailyTotal);
                }
            }

            // Destruir gráfica anterior para evitar sobreposición (Glitch de Chart.js)
            if (salesChartInstance) {
                salesChartInstance.destroy();
            }

        function generateInventoryReport() {
            // Calcular fecha de hace 7 días
            const today = new Date();
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(today.getDate() - 7);
            sevenDaysAgo.setHours(0, 0, 0, 0);

            const dateRangeStr = `Del ${sevenDaysAgo.toLocaleDateString('es-MX')} al ${today.toLocaleDateString('es-MX')}`;
            
            const totalValue = state.inventory.reduce((sum, item) => sum + (item.stock * item.cost), 0);
            const lowStockItems = state.inventory.filter(i => i.stock <= i.minStock);

            // 1. Calcular Entradas (Últimos 7 días)
            const weeklyEntries = state.inventoryMovements.filter(m => 
                m.type === 'entry' && new Date(m.timestamp) >= sevenDaysAgo
            );

            // Agrupar entradas semanales por insumo (Suma las compras del mismo producto)
            const groupedEntriesMap = {};
            weeklyEntries.forEach(e => {
                if (!groupedEntriesMap[e.itemId]) {
                    groupedEntriesMap[e.itemId] = { name: e.itemName, qty: 0 };
                }
                groupedEntriesMap[e.itemId].qty += e.quantity;
            });
            const groupedEntries = Object.values(groupedEntriesMap).sort((a, b) => b.qty - a.qty);

            const outputsMap = {}; 
            
            // 2. Calcular Salidas de las Ventas Terminadas (Cobradas) en los últimos 7 días
            const weeklySales = state.sales.filter(s => new Date(s.timestamp) >= sevenDaysAgo);
            weeklySales.forEach(sale => {
                sale.items.forEach(cartItem => {
                    const product = state.products.find(p => p.id === cartItem.productId);
                    if (product && product.ingredients) {
                        product.ingredients.forEach(ing => {
                            if (!outputsMap[ing.id]) outputsMap[ing.id] = 0;
                            outputsMap[ing.id] += ing.qty * cartItem.quantity;
                        });
                    }
                });
            });

            // 3. Sumar Salidas de los Pedidos en Curso actuales (Mesas sin pagar)
            const activeOrdersWeekly = state.orders.filter(o => 
                new Date(o.createdAt) >= sevenDaysAgo && 
                o.status !== 'cancelled'
            );
            activeOrdersWeekly.forEach(order => {
                order.items.forEach(cartItem => {
                    const product = state.products.find(p => p.id === cartItem.productId);
                    if (product && product.ingredients) {
                        product.ingredients.forEach(ing => {
                            if (!outputsMap[ing.id]) outputsMap[ing.id] = 0;
                            outputsMap[ing.id] += ing.qty * cartItem.quantity;
                        });
                    }
                });
            });

            // 4. Formatear la lista para el PDF
            const weeklyOutputs = Object.keys(outputsMap).map(itemId => {
                const invItem = state.inventory.find(i => i.id === parseInt(itemId));
                return {
                    name: invItem ? invItem.name : 'Insumo Eliminado',
                    qty: outputsMap[itemId],
                    unit: invItem ? invItem.unit : ''
                };
            }).filter(item => item.qty > 0).sort((a, b) => b.qty - a.qty); 

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `

                                <p class="text-xl font-extrabold text-black mt-1">$${totalValue.toLocaleString()}</p>

                            <div class="p-4 ${lowStockItems.length > 0 ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700'} rounded-lg border text-center">

                        <div class="mb-8 break-inside-avoid">

                                    ${groupedEntries.length > 0 ? `

       function downloadDirectPDF() {
            const btn = document.getElementById('pdfDownloadBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Generando PDF...';
            btn.disabled = true;

            showToast('Procesando el documento...', 'info');
            
            const element = document.getElementById('printArea');

            const opt = {
                margin:       [15, 10, 15, 10], // Márgenes: Arriba, Derecha, Abajo, Izquierda (en milímetros)
                filename:     `Inventario_Rufaza_${new Date().toISOString().split('T')[0]}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true,
                    scrollY: 0 // Evita errores si hiciste scroll antes de imprimir
                    // 🔥 Eliminamos windowWidth y windowHeight que causaban el recorte izquierdo
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                // 🔥 MAGIA: Evita que el texto o las tablas se corten a la mitad de la hoja
                pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] } 
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                showToast('✅ PDF guardado exitosamente', 'success');
            });
        }

        // ==================== REPORTE MENSUAL COMPLETO (PDF) - CONECTADO A LA GRÁFICA ====================
        function generateMonthlyReport() {
            try {
                // 1. Escudos de seguridad: Asegurar que existan los arreglos
                if (!state.sales) state.sales = [];
                if (!state.inventory) state.inventory = [];
                if (!state.expenses) state.expenses = []; // Escudo para gastos

                // 🌟 MAGIA: Usamos el mes y año que el usuario tiene seleccionado en la gráfica
                // Si la gráfica está en "Últimos 7 días", tomará el mes actual por defecto
                const targetDate = new Date(reportSelectedYear, reportSelectedMonth, 1);
                const currentMonthName = targetDate.toLocaleString('es-MX', { month: 'long', year: 'numeric' }).toUpperCase();
                
                // Calculamos el primer y último día del MES SELECCIONADO
                const firstDay = new Date(reportSelectedYear, reportSelectedMonth, 1);
                const lastDay = new Date(reportSelectedYear, reportSelectedMonth + 1, 0, 23, 59, 59);

                // Filtrar ventas y gastos del mes exacto que se está viendo
                const monthlySales = state.sales.filter(s => {
                    if (!s.timestamp) return false;
                    const sDate = new Date(s.timestamp);
                    return sDate >= firstDay && sDate <= lastDay;
                });

                const monthlyExpenses = state.expenses.filter(e => {
                    if (!e.timestamp) return false;
                    const eDate = new Date(e.timestamp);
                    return eDate >= firstDay && eDate <= lastDay;
                });

                // 2. Matemáticas Financieras
                const totalIncome = monthlySales.reduce((sum, s) => sum + (s.total || 0), 0);
                const cashIncome = monthlySales.filter(s => s.paymentMethod === 'cash').reduce((sum, s) => sum + (s.total || 0), 0);
                const transferIncome = monthlySales.filter(s => s.paymentMethod === 'transfer').reduce((sum, s) => sum + (s.total || 0), 0);
                
                // Sumar gastos y sacar ganancia neta
                const totalEgresos = monthlyExpenses.reduce((sum, e) => sum + (e.amount || 0), 0);

                                productStats[item.name] = { qty: 0, revenue: 0 };

                            productStats[item.name].revenue += ((item.price || 0) * (item.quantity || 1));

        function startDragTable(e, element) {
            // 1. Evitar arrastrar si se tocó el botón de basura
            if (e.target.closest('.delete-btn')) return;
            
            floorPlanDragTarget = element;
            
            // 2. Coordenadas de la pantalla donde el dedo tocó
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            const canvasRect = document.getElementById('floorPlanCanvas').getBoundingClientRect();
            
            // 3. Posición actual de la mesa en porcentaje
            const currentXP = parseFloat(element.style.left) || 50;
            const currentYP = parseFloat(element.style.top) || 50;
            
            // 4. Matemáticas: Calcular el "offset" (distancia entre el centro de la mesa y el dedo)
            // Esto evita que la mesa "salte" brusco al tocarla
            floorPlanStartX = ((clientX - canvasRect.left) / canvasRect.width * 100) - currentXP;
            floorPlanStartY = ((clientY - canvasRect.top) / canvasRect.height * 100) - currentYP;
            
            element.style.zIndex = 1000;
            element.classList.add('border-blue-500', 'scale-110', 'bg-blue-50');
        }

        function dragTable(e) {
            if (!floorPlanDragTarget) return;
            
            // Bloqueo de seguridad extremo para móviles (impide recargar página al jalar hacia abajo)
            if(e.cancelable && e.type.includes('touch')) e.preventDefault(); 
            
            const canvasRect = document.getElementById('floorPlanCanvas').getBoundingClientRect();
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            // 1. Calcular dónde está el dedo en porcentaje de la pantalla
            let currentTouchXP = (clientX - canvasRect.left) / canvasRect.width * 100;
            let currentTouchYP = (clientY - canvasRect.top) / canvasRect.height * 100;

            // 2. Restar el offset inicial
            let newXP = currentTouchXP - floorPlanStartX;
            let newYP = currentTouchYP - floorPlanStartY;
            
            // 3. Márgenes: Evitar que se salgan del cuadro (Topamos entre 5% y 95%)
            newXP = Math.max(8, Math.min(92, newXP)); 
            newYP = Math.max(8, Math.min(92, newYP));

            // 4. Mover físicamente
            floorPlanDragTarget.style.left = newXP + '%';
            floorPlanDragTarget.style.top = newYP + '%';
        }

        function stopDragTable() {
            if (floorPlanDragTarget) {
                floorPlanDragTarget.style.zIndex = '';
                floorPlanDragTarget.classList.remove('border-blue-500', 'scale-110', 'bg-blue-50');

        async function createNewBranch() {
            const nameInput = document.getElementById('newBranchName').value.trim();
            if (!nameInput) {
                showToast('Ingresa un nombre para la sucursal', 'warning');
                return;
            }

            // Mismo formateo de ID
            let cleanName = nameInput.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            cleanName = cleanName.replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
            const branchId = 'sucursal_' + cleanName;

            try {
                // 1. Verificamos que no estemos sobreescribiendo una sucursal existente
                const docRef = await db.collection('pizzaManager').doc(branchId).get();
                if (docRef.exists) {
                    showToast('Ese nombre de sucursal ya existe', 'error');
                    return;
                }

                // 2. Preparamos la nueva base de datos limpia pero clonando el MENÚ ACTUAL
                const newEnvironment = JSON.parse(JSON.stringify(DEFAULT_DATA));
                newEnvironment.products = JSON.parse(JSON.stringify(state.products)); 
                
                // Le pasamos solo a los administradores para que puedan acceder
                newEnvironment.users = state.users.filter(u => u.role === 'admin' || u.id === currentUser.id);

                // 3. Subimos la nueva sucursal a la nube
                await db.collection('pizzaManager').doc(branchId).set(newEnvironment);
                
                // 4. Registramos el ID en la matriz de la Sucursal Principal para el Motor de Sincronización
                if (!state.franchiseBranches) {
                    state.franchiseBranches = ['sucursal_centro']; // Metemos la del centro por defecto
                }
                if (!state.franchiseBranches.includes(branchId)) {
                    state.franchiseBranches.push(branchId);
                    saveToStorage();
                }
                
                logActivity('BRANCH_CREATE', `Nueva sucursal desplegada: ${nameInput}`);
                
                // 5. ¡Éxito! Mostrarle al usuario qué hacer ahora.
                showBranchCreatedSuccessModal(nameInput, branchId);
                
            } catch (error) {
                console.error('Error al crear sucursal:', error);
                showToast('Error al crear la base de datos', 'error');
            }
        }

        async function updateBranchAdmin(branchId, adminUserId, isNewAdmin) {
            try {
                const newUsername = document.getElementById('branchAdminUsername').value.trim().toLowerCase();
                const newPassword = document.getElementById('branchAdminPassword').value;

                if (!newUsername) {
                    showToast('El usuario no puede estar vacío.', 'warning');
                    return;
                }
                
                if (isNewAdmin && !newPassword) {
                    showToast('Debes asignar una contraseña al nuevo administrador.', 'warning');
                    return;
                }

                // Obtener documento actual
                const branchRef = db.collection('pizzaManager').doc(branchId);
                const doc = await branchRef.get();
                if (!doc.exists) return;

                const branchState = doc.data();
                let usersList = branchState.users || [];
                
                // Comprobar si el nombre de usuario ya está ocupado por un cajero/mesero en esa misma sucursal
                const isTaken = usersList.some(u => u.username === newUsername && u.id !== adminUserId);
                if (isTaken) {
                    showToast('Ese nombre de usuario ya está en uso en esta sucursal.', 'error');
                    return;
                }

                if (isNewAdmin) {
                    // Si no existía, lo inyectamos al arreglo
                    usersList.push({
                        id: adminUserId,
                        name: 'Administrador Principal',
                        username: newUsername,
                        password: newPassword,
                        role: 'admin',
                        active: true
                    });
                } else {
                    // Si ya existía, lo actualizamos
                    usersList = usersList.map(u => {
                        if (u.id === adminUserId) {
                            return {
                                ...u,
                                username: newUsername,
                                password: newPassword ? newPassword : u.password
                            };
                        }
                        return u;
                    });
                }

                // Guardar la actualización directamente en Firebase
                await branchRef.update({ users: usersList });

                showToast('✅ Credenciales guardadas exitosamente', 'success');
                closeModal();

            } catch (error) {
                console.error("Error al actualizar credenciales:", error);
                showToast('Error al guardar los datos en la nube.', 'error');
            }
        }

        // ==================== VIAJE EN EL TIEMPO (HISTORIAL EN LA NUBE) ====================
        async function changeTicketsDate(dateStr) {
            window.selectedTicketsDate = dateStr;
            const container = document.getElementById('contentArea');
            
            // Lógica de fecha local
            const getLocalYYYYMMDD = (dateObj) => {
                const d = new Date(dateObj);
                if (isNaN(d)) return "";
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            };
            const todayLocalStr = getLocalYYYYMMDD(new Date());

            // Si pide ver el día de HOY, usamos la memoria ultrarrápida
            if(dateStr === todayLocalStr) {
                renderTicketHistory(container);
                return;
            }

            // Si pide el pasado, ponemos pantalla de carga y vamos a Firebase
            container.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center animate-pulse">
                    <div class="text-5xl mb-4 drop-shadow-md">☁️</div>
                    <p class="text-theme-greenDark font-bold text-lg">Buscando tickets del ${dateStr} en el archivo infinito...</p>
                </div>
            `;
            
            const start = new Date(dateStr + 'T00:00:00');
            const end = new Date(dateStr + 'T23:59:59');
            
            try {
                // Buscamos solo en esa fecha
                const snapshot = await db.collection('pizzaManager').doc(currentBranch)
                    .collection('sales')
                    .where('timestamp', '>=', start.toISOString())
                    .where('timestamp', '<=', end.toISOString())
                    .get();
                    
                // Reemplazamos temporalmente la memoria visual con los datos del pasado
                state.sales = [];
                snapshot.forEach(doc => state.sales.push(doc.data()));
                
                renderTicketHistory(container);
            } catch(e) {
                console.error("Error al descargar historial:", e);
                showToast('Error al contactar el servidor', 'error');
            }
        }

                                    <button onclick="deleteInventoryCategory(${cat.id})" class="p-2 bg-red-50 border border-red-200 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition shadow-sm" title="Eliminar Categoría">🗑️</button>

                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="pt-4 border-t border-theme-beige flex gap-2">
                        <input type="text" id="newInvCatName" placeholder="Nueva categoría..." class="flex-1 px-4 py-2.5 bg-white border border-theme-beige rounded-xl focus:outline-none focus:border-theme-green font-bold text-sm shadow-inner text-theme-text">
                        <button onclick="addInventoryCategoryFromModal()" class="px-5 py-2.5 bg-theme-green text-white font-extrabold rounded-xl shadow-md hover:bg-theme-greenDark transition text-sm">Agregar</button>

        // Esta función se queda igual
        function addInventoryCategoryFromModal() {
            const input = document.getElementById('newInvCatName');
            const name = input.value.trim();
            if (!name) return;
            
            const newId = state.inventoryCategories.length > 0 ? Math.max(...state.inventoryCategories.map(c => c.id)) + 1 : 1;
            state.inventoryCategories.push({ id: newId, name: name });
            saveToStorage();
            showToast('✅ Categoría agregada', 'success');
            manageInventoryCategoriesModal(); 
            if (currentView === 'inventory') renderInventory(document.getElementById('contentArea'));
        }

        // Esta función se queda igual
        function editInventoryCategory(id) {
            const cat = state.inventoryCategories.find(c => c.id === id);
            if (!cat) return;
            const newName = prompt("📝 Ingresa el nuevo nombre para la categoría:", cat.name);
            if (newName && newName.trim() !== "" && newName !== cat.name) {
                // Actualizamos el nombre en la lista de categorías
                const oldName = cat.name;
                cat.name = newName.trim();
                
                // 🛠️ MIGRACIÓN: Actualizamos también todos los insumos que usaban el nombre viejo
                if (state.inventory) {
                    state.inventory.forEach(item => {
                        if (item.category === oldName) item.category = cat.name;
                    });
                }
                
                saveToStorage();
                showToast('✅ Categoría actualizada', 'success');
                manageInventoryCategoriesModal(); 
                if (currentView === 'inventory') renderInventory(document.getElementById('contentArea'));
            }
        }

        function deleteInventoryCategory(id) {
            const cat = state.inventoryCategories.find(c => c.id === id);
            if (!cat) return;

            // 🛡️ Candado de Seguridad Reforzado: Busca coincidencias tanto por ID numérico como por texto viejo
            const inUse = state.inventory && state.inventory.some(item => item.category === id || item.category === cat.name);
            
            if (inUse) {
                alert("⚠️ ACCIÓN DENEGADA: No puedes eliminar esta categoría porque hay insumos registrados dentro de ella. Por favor, elimina esos insumos o cámbialos a otra categoría primero.");
                return;
            }
            
            if (confirm("🗑️ ¿Estás totalmente seguro de que deseas eliminar esta categoría?")) {
                state.inventoryCategories = state.inventoryCategories.filter(c => c.id !== id);
                saveToStorage();
                showToast('✅ Categoría eliminada', 'success');
                manageInventoryCategoriesModal(); 
                if (currentView === 'inventory') renderInventory(document.getElementById('contentArea'));
            }
        }

        // ==================== SUPPLIERS MODULE (CATÁLOGO DINÁMICO) ====================

            const isNew = supplierId === null;
            const supplier = isNew ? { id: '', name: '', contact: '', email: '' } : state.suppliers.find(s => s.id === supplierId);
            
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-[95%] max-w-md animate-slideIn shadow-2xl border-2 border-white">

                        <div>

                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-theme-text">Correo Electrónico (Opcional)</label>
                            <input type="email" id="suppEmail" value="${supplier.email}" class="w-full px-4 py-3 bg-white border border-theme-beige rounded-xl focus:outline-none focus:border-theme-green font-medium text-theme-text shadow-inner" placeholder="Ej: ventas@empresa.com">
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-4 border-t border-theme-beige mt-2">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-bold text-theme-text shadow-sm">Cancelar</button>
                            <button onclick="saveSupplier(${isNew ? 'null' : supplierId})" class="btn-primary py-3 rounded-xl font-bold shadow-md">Guardar</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('suppName').focus(), 100);
        }

        function saveSupplier(supplierId) {
            const name = document.getElementById('suppName').value.trim();
            const contact = document.getElementById('suppContact').value.trim();
            const email = document.getElementById('suppEmail').value.trim();

            if (!name) {
                showToast('El nombre del proveedor es obligatorio', 'warning');
                return;
            }

            if (!state.suppliers) state.suppliers = []; // Seguro por si el array no existe

            if (supplierId === null) {
                // Agregar Nuevo
                state.suppliers.push({
                    id: Date.now(),
                    name,
                    contact,
                    email
                });
                logActivity('SUPPLIER_ADD', `Nuevo proveedor agregado: ${name}`);
            } else {
                // Editar Existente
                const supplier = state.suppliers.find(s => s.id === supplierId);
                if (supplier) {
                    supplier.name = name;
                    supplier.contact = contact;
                    supplier.email = email;
                    logActivity('SUPPLIER_UPDATE', `Proveedor actualizado: ${name}`);
                }
            }

            saveToStorage(); // Guarda en Firebase
            showToast('Proveedor guardado exitosamente', 'success');
            closeModal();
            renderSettings(document.getElementById('contentArea')); // Refresca la pantalla
        }

        function confirmDeleteSupplier(supplierId) {
            const supplier = state.suppliers.find(s => s.id === supplierId);
            if (!supplier) return;

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-[95%] max-w-md animate-slideIn shadow-2xl border-2 border-red-300 text-center">
                    <div class="text-5xl mb-4 drop-shadow-md">⚠️</div>
                    <h3 class="text-xl font-extrabold mb-2 text-red-600">¿Eliminar Proveedor?</h3>
                    <p class="text-sm text-theme-text font-medium mb-6">Estás a punto de eliminar a <strong>${supplier.name}</strong> del catálogo de contactos.</p>
                    
                    <div class="grid grid-cols-2 gap-3">

                        <button onclick="deleteSupplier(${supplier.id})" class="bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-bold shadow-md transition">Sí, Eliminar</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function deleteSupplier(supplierId) {
            const supplier = state.suppliers.find(s => s.id === supplierId);
            if (supplier) {
                // Filtramos para quitar el eliminado
                state.suppliers = state.suppliers.filter(s => s.id !== supplierId);
                
                logActivity('SUPPLIER_DELETE', `Proveedor eliminado: ${supplier.name}`);
                saveToStorage(); // Guarda en Firebase
                
                showToast(`Proveedor ${supplier.name} eliminado`, 'success');
                closeModal();
                renderSettings(document.getElementById('contentArea')); // Refresca la pantalla
            }
        }

        // ==================== LIBERAR MESA MANUALMENTE ====================
        function freeTable(tableId) {
            // Verificamos por seguridad que no tenga una cuenta abierta sin pagar
            const unpaidOrder = state.orders.find(o => o.tableId === tableId && o.paymentStatus !== 'paid' && o.status !== 'cancelled');
            
            if (unpaidOrder) {
                showToast('⚠️ No puedes desocupar la mesa, hay una cuenta sin pagar.', 'error');
                return;
            }
            
            const table = state.tables.find(t => t.id === tableId);
            if (table) {
                table.status = 'free';
                saveToStorage();
                showToast(`✅ ${table.name} desocupada y limpia`, 'success');
                closeModal();
                if (currentView === 'waiter') renderWaiter(document.getElementById('contentArea'));
            }
        }
