        async function saveToStorage() {
            try {

                const cleanState = { ...state };
                
                // 🌟 MAGIA ARQUITECTÓNICA: Borramos las ventas de este paquete.

        // ==================== ARCHIVERO INFINITO DE VENTAS ====================
        async function saveSaleToCloud(sale) {
            try {
                // Crea una sub-carpeta llamada 'sales' dentro de tu sucursal y guarda el ticket con su propio ID
                await db.collection('pizzaManager').doc(currentBranch)
                        .collection('sales').doc(sale.id.toString()).set(sale);
            } catch (error) {
                console.error("Error al subir el ticket a la nube:", error);

        // 💡 Pon esta variable HASTA ARRIBA de tu código, junto a 'let stateUnsubscribe = null;'
        let salesUnsubscribe = null; 

        function loadFromStorage(branchId) {
            return new Promise((resolve) => {
                if (stateUnsubscribe) stateUnsubscribe();
                if (salesUnsubscribe) salesUnsubscribe(); // Apagar conexión de ventas vieja
                
                currentBranch = branchId;
                let isFirstLoad = true; 
                
                // 1. Conexión del Esqueleto (Mesas, Inventario)
                stateUnsubscribe = db.collection('pizzaManager').doc(currentBranch).onSnapshot((doc) => {
                    if (doc.exists) {
                        const incomingData = doc.data();
                        
                        // Rescatamos las ventas que ya teníamos en memoria para que no se borren al actualizar el esqueleto
                        const currentSales = state.sales || []; 
                        state = { ...DEFAULT_DATA, ...incomingData };
                        state.sales = currentSales; 

                        if (!isFirstLoad && currentUser && currentUser.role === 'kitchen') {
                            const oldOrders = state.orders ? state.orders.length : 0;
                            const newOrders = incomingData.orders ? incomingData.orders.length : 0;
                            if (newOrders > oldOrders) playKitchenBell();
                        }

                        if (currentUser) {
                            renderView(currentView); 
                            updateNotificationBadge();
                        }
                    } else {
                        state = JSON.parse(JSON.stringify(DEFAULT_DATA));
                        state.sales = [];
                        if (currentUser) renderView(currentView);
                    }
                    isFirstLoad = false;
                    resolve();
                }, (error) => {
                    console.error("Error de Firebase:", error);
                    resolve();
                });

                // 🚀 2. CONEXIÓN AL ARCHIVERO INFINITO (SOLO DESCARGA HOY)
                const todayStart = new Date();
                todayStart.setHours(0,0,0,0);
                
                salesUnsubscribe = db.collection('pizzaManager').doc(currentBranch)
                    .collection('sales')
                    .where('timestamp', '>=', todayStart.toISOString())
                    .onSnapshot(snapshot => {
                        state.sales = [];
                        snapshot.forEach(doc => state.sales.push(doc.data()));
                        
                        // Refrescar gráficas o historial si alguien hace una venta en otra tablet
                        if(!isFirstLoad && (currentView === 'dashboard' || currentView === 'tickethistory' || currentView === 'reports')) {
                            renderView(currentView);
                        }
                    });
            });
        }

       async function handleLogin() {
            const username = document.getElementById('loginUser').value.toLowerCase();
            const password = document.getElementById('loginPass').value;
            const branch = document.getElementById('loginBranch').value;
            const errorDiv = document.getElementById('loginError');
            
            const btn = document.querySelector('button[onclick="handleLogin()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Conectando a Sucursal...';
            btn.disabled = true;

            try {
                // 1. Buscamos los datos de ESA sucursal en Firebase ANTES de hacer login
                const doc = await db.collection('pizzaManager').doc(branch).get();
                let branchState = doc.exists ? doc.data() : DEFAULT_DATA; // Si es nueva, usa los datos por defecto

                // 2. Verificamos si el usuario existe EN ESA sucursal
                const user = branchState.users.find(u => u.username === username && u.password === password && u.active);

                if (user) {
                    currentUser = user;
                    currentBranch = branch;
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    localStorage.setItem('currentBranch', branch);
                    
                    // 3. Arrancamos la sincronización en vivo de la sucursal
                    await loadFromStorage(branch); 
                    
                    const branchLabel = document.getElementById('headerBranchName');
                    if (branchLabel) branchLabel.textContent = branch === 'sucursal_principal' ? 'Principal' : 'Centro';
                    logActivity('LOGIN', `Usuario ${user.name} inició sesión`);
                    
                    errorDiv.classList.add('hidden');
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    initMainApp();
                } else {
                    errorDiv.textContent = 'Usuario o contraseña incorrectos en esta Sucursal';
                    errorDiv.classList.remove('hidden');
                    document.getElementById('loginUser').parentElement.classList.add('animate-shake');
                    setTimeout(() => document.getElementById('loginUser').parentElement.classList.remove('animate-shake'), 500);
                }
            } catch (error) {
                console.error("🔥 Error exacto de Firebase:", error); // Lo mostrará en la consola (F12)
                errorDiv.textContent = 'Error: ' + error.message; // Te lo mostrará en la pantalla roja
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function handleLogout() {
            logActivity('LOGOUT', `Usuario ${currentUser.name} cerró sesión`);
            currentUser = null;
            localStorage.removeItem('currentUser');

            if (stateUnsubscribe) stateUnsubscribe(); // Detener internet de la sucursal actual
            
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }

        // Colores pastel para los estados
        function getStatusClass(status) {
            const classes = {
                pending: 'bg-yellow-200 text-yellow-800',
                preparing: 'bg-blue-200 text-blue-800',
                ready: 'bg-green-200 text-green-800',
                delivered: 'bg-purple-200 text-purple-800',
                cancelled: 'bg-gray-300 text-gray-800'
            };
            return classes[status] || 'bg-gray-300';
        }

        function getStatusLabel(status) {
            const labels = { pending: 'Pendiente', preparing: 'Preparando', ready: 'Listo', delivered: 'Finalizado', cancelled: 'Cancelado' };
            return labels[status] || status;
        }

        // ==================== VERIFICACIÓN DE STOCK AUTOMÁTICA ====================
        function checkProductAvailability() {
            let inventoryChanged = false;
            
            state.products.forEach(product => {
                // Solo revisamos los productos que actualmente están activos y tienen receta
                if (product.active && product.ingredients && product.ingredients.length > 0) {
                    let hasStock = true;
                    
                    for (let ing of product.ingredients) {
                        const invItem = state.inventory.find(i => i.id === ing.id);
                        // Si el insumo no existe o el stock bajó a menos de lo que pide 1 receta
                        if (!invItem || invItem.stock < ing.qty) {
                            hasStock = false;
                            break;
                        }
                    }

                    if (!hasStock) {
                        product.active = false; // Oculta el producto
                        inventoryChanged = true;
                        
                        // Enviar alerta roja al sistema
                        addNotification('error', `🚫 ${product.name} agotado (Se ocultó del menú automáticamente).`, ['admin', 'cashier', 'waiter']);
                        logActivity('SYSTEM_AUTO', `Producto ${product.name} desactivado por falta de insumos.`);
                    }
                }
            });

            if (inventoryChanged) {
                saveToStorage();
                // Refrescar la pantalla si el usuario está viendo el menú en ese momento
                if (currentView === 'pos') renderPOS(document.getElementById('contentArea'));
                if (currentView === 'products') renderProducts(document.getElementById('contentArea'));
                
                // Si el modal de la mesa está abierto, lo actualizamos para que desaparezca el producto
                if (!document.getElementById('modalContainer').classList.contains('hidden') && selectedTable) {
                    selectTable(selectedTable); 
                }
            }
        }

        // ==================== VERIFICACIÓN DINÁMICA DE STOCK ====================
        function hasEnoughStock(product) {
            if (!product.ingredients || product.ingredients.length === 0) return true;
            for (let ing of product.ingredients) {
                const invItem = state.inventory.find(i => i.id === ing.id);
                // Si el insumo no existe o el stock es menor a lo que pide la receta
                if (!invItem || invItem.stock < ing.qty) {
                    return false;
                }
            }
            return true;
        }

        // ==================== MOTOR DE MITAD Y MITAD (HALF & HALF) ====================

        function createHalfAndHalf(tableId) {
            const id1 = parseInt(document.getElementById('half1').value);
            const id2 = parseInt(document.getElementById('half2').value);

            if (id1 === id2) {
                showToast('Debes elegir dos pizzas diferentes', 'warning');
                return;
            }

            const p1 = state.products.find(p => p.id === id1);
            const p2 = state.products.find(p => p.id === id2);

            // 1. Fusionar Ingredientes: Tomamos la mitad (qty / 2) de ambas recetas
            const mergedIngredients = [];
            const addHalfIng = (ingList) => {
                if(!ingList) return;
                ingList.forEach(ing => {
                    const existing = mergedIngredients.find(i => i.id === ing.id);
                    if(existing) {
                        existing.qty += (ing.qty / 2);
                    } else {
                        mergedIngredients.push({ id: ing.id, qty: (ing.qty / 2) });
                    }
                });
            };
            addHalfIng(p1.ingredients);
            addHalfIng(p2.ingredients);

            // 2. Fusionar Tamaños: Si tienen tamaños (Chica, Mediana), cobramos el tamaño más caro de las dos
            let mergedSizes = [];
            if (p1.sizes && p1.sizes.length > 0 && p2.sizes && p2.sizes.length > 0) {
                p1.sizes.forEach(s1 => {
                    const s2 = p2.sizes.find(s => s.name === s1.name);
                    if (s2) {
                        mergedSizes.push({
                            name: s1.name,
                            price: Math.max(s1.price, s2.price)
                        });
                    }
                });
            }

            // 3. Crear el Producto Virtual (No se subirá a la nube gracias a isVirtual)
            const virtualId = Date.now();
            const virtualName = `Mitad ${p1.name.replace('Pizza ', '')} / Mitad ${p2.name.replace('Pizza ', '')}`;
            
            const virtualProduct = {
                id: virtualId,
                name: virtualName,
                category: 'custom_half', 
                price: Math.max(p1.price, p2.price), // Cobra el precio base de la pizza más cara
                image: null,
                icon: '🌗',
                ingredients: mergedIngredients,
                sizes: mergedSizes,
                active: false,
                isVirtual: true // <--- ¡Esta es la llave mágica de seguridad!
            };

            // Metemos la pizza fusionada al estado para que el sistema le pueda restar el inventario exacto
            state.products.push(virtualProduct);

            // 4. Mandarlo al flujo inteligente (Si tiene tamaños, abrirá la ventana de tamaños. Si no, irá directo al carrito)
            handleProductClick(virtualId, tableId);
        }

        // ==================== VERIFICACIÓN INTELIGENTE DE STOCK EN CARRITO ====================
        function canAddToCart(productId, qtyToAdd) {
            const product = state.products.find(p => p.id === productId);
            if (!product || !product.ingredients || product.ingredients.length === 0) return true;

            // 1. Calculamos cuánto de cada insumo ya está "reservado" en el carrito actual
            const currentUsage = {};
            currentCart.forEach(cartItem => {
                const p = state.products.find(x => x.id === cartItem.productId);
                if (p && p.ingredients) {
                    p.ingredients.forEach(ing => {
                        currentUsage[ing.id] = (currentUsage[ing.id] || 0) + (ing.qty * cartItem.quantity);
                    });
                }
            });

            // 2. Verificamos si al intentar agregar la nueva cantidad, superamos el stock real
            for (let ing of product.ingredients) {
                const invItem = state.inventory.find(i => i.id === ing.id);
                if (!invItem) return false;
                
                const alreadyUsedInCart = currentUsage[ing.id] || 0;
                const newlyNeeded = ing.qty * qtyToAdd;
                
                // Redondeamos a 3 decimales para evitar el clásico error de precisión de Javascript
                const totalNeeded = Number((alreadyUsedInCart + newlyNeeded).toFixed(3));
                const availableStock = Number(invItem.stock.toFixed(3));

                if (availableStock < totalNeeded) {
                    const remainingStock = Number((availableStock - alreadyUsedInCart).toFixed(3));
                    showToast(`Stock insuficiente de ${invItem.name}. Solo quedan para ${remainingStock} ${invItem.unit} disponibles.`, 'error');
                    return false;
                }
            }
            return true;
        }

        // ==================== MOTOR DE VARIANTES Y TAMAÑOS ====================
        function handleProductClick(productId, tableId = null) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            // Si el producto tiene tamaños configurados, abrimos el Pop-up
            if (product.sizes && product.sizes.length > 0) {
                showSizeSelectionModal(product, tableId);
            } else {
                // Si es un producto normal (Ej. Coca Cola), va directo al carrito
                if (tableId) {
                    addToTableOrder(productId, tableId);
                } else {
                    addToCart(productId);
                }
            }
        }

        function showSizeSelectionModal(product, tableId) {
            const modal = document.getElementById('modalContainer');
            
            const sizesHtml = product.sizes.map((size, index) => `

        function addSizedProductToCart(productId, sizeIndex, tableId) {
            const product = state.products.find(p => p.id === productId);
            const size = product.sizes[sizeIndex];
            
            // Fusionamos el nombre para el ticket (Ej. "Pizza Margarita (Familiar)")
            const fullName = `${product.name} (${size.name})`;
            
            // Verificamos stock base
            if (!canAddToCart(productId, 1)) return;

            // Buscamos si ya existe este TAMAÑO EXACTO en el carrito
            const existing = currentCart.find(item => item.productId === productId && item.name === fullName && !item.note);
            
            if (existing) {
                existing.quantity++;
            } else {
                currentCart.push({ 
                    productId: productId, 
                    name: fullName, 
                    price: size.price, 
                    quantity: 1
                });
            }

            // Redirigimos según de dónde vino el clic (Mesa o Mostrador)
            if (tableId) {
                selectTable(tableId, window.isMobileCartOpen);
            } else {
                updateCartDisplay();
                closeModal();
            }
        }

        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            // 🚫 BLOQUEO: Pregunta si los ingredientes alcanzan antes de agregar
            if (!canAddToCart(productId, 1)) {
                return; // Se cancela la acción si no hay stock
            }

            const existing = currentCart.find(item => item.productId === productId);
            if (existing) {
                existing.quantity++;
            } else {
                currentCart.push({ productId, name: product.name, price: product.price, quantity: 1 });
            }
            updateCartDisplay();
        }

        function removeFromCart(productId) {
            currentCart = currentCart.filter(item => item.productId !== productId);
            updateCartDisplay();
        }

        function updateCartItemQty(productId, delta) {
            const item = currentCart.find(i => i.productId === productId);
            if (item) {
                // 🚫 BLOQUEO: Si el usuario presiona "+1", verificamos el stock primero
                if (delta > 0 && !canAddToCart(productId, delta)) {
                    return; // Se cancela la acción si no hay stock
                }

                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartDisplay();
                }
            }
        }
        function clearCart() {
            currentCart = [];
            updateCartDisplay();
        }

        function renderCartItems() {
            if (currentCart.length === 0) {
                return '<p class="text-theme-textMuted text-center py-8">El carrito está vacío</p>';
            }
            // Agregamos un identificador único (índice) a cada item para poder editar sus notas correctamente
            return currentCart.map((item, index) => `

                    <div class="flex items-center justify-between">

                            <span class="w-6 text-center font-bold">${item.quantity}</span>

        function saveNoteToCartItem(cartIndex) {

        function calculateCartTotal() {
            return currentCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

}

            const sale = state.sales.find(s => s.id === saleId);

            // Ponemos el cursor automáticamente en el campo de texto

        function executeWhatsappSend(saleId) {
            const sale = state.sales.find(s => s.id === saleId);
            if (!sale) return;

            const phoneInput = document.getElementById('waCustomerPhone').value;
            const cleanPhone = phoneInput.replace(/\D/g, ''); // Limpiar cualquier espacio o letra

            if (cleanPhone.length < 10) {
                showToast("El número debe tener al menos 10 dígitos", "warning");
                const inputEl = document.getElementById('waCustomerPhone').parentElement;
                inputEl.classList.add('border-red-500', 'animate-shake');
                setTimeout(() => inputEl.classList.remove('border-red-500', 'animate-shake'), 500);
                return;
            }

            // ==================== ARMADO DEL MENSAJE DE WHATSAPP ====================
            let msg = `🍕 *PIZZAMANÍA*\n`;
            msg += `Ticket de Venta\n`;
            msg += `Roberto Morales Muciño\n`;
            msg += `MOMR7707196C1\n`;
            msg += `11a. Calle Pte. No 62. C.P 30068\n`;
            msg += `Comitán de Domínguez, Chis.\n`;
            msg += `--------------------------------------\n`;
            msg += `*Ticket #:* ${sale.orderId.toString().slice(-4)}\n`;
            msg += `*Fecha:* ${new Date(sale.timestamp).toLocaleString('es-MX')}\n`;
            msg += `--------------------------------------\n`;
            
            sale.items.forEach(item => {
                msg += `▪️ ${item.quantity}x ${item.name}\n`;
                if(item.note) msg += `   _(Nota: ${item.note})_\n`;
                msg += `   *$${(item.price * item.quantity).toLocaleString()}*\n`;
            });
            
            msg += `--------------------------------------\n`;
            if (sale.discount > 0) {
                msg += `*Subtotal:* $${(sale.total + sale.discount).toLocaleString()}\n`;
                msg += `*Descuento:* -$${sale.discount.toLocaleString()}\n`;
            }
            msg += `*TOTAL A PAGAR: $${sale.total.toLocaleString()}*\n`;
            msg += `--------------------------------------\n`;
            
            // --- LÓGICA DE DETALLE DE PAGO PARA WHATSAPP ---
            msg += `*DETALLE DE PAGO:*\n`;
            if (sale.paymentsBreakdown && sale.paymentsBreakdown.length > 0) {
                sale.paymentsBreakdown.forEach(p => {
                    if (p.method === 'cash') {
                        msg += `💵 PAGÓ CON (Efectivo): $${(p.received || p.amount).toLocaleString()}\n`;
                    } else {
                        msg += `📱 TRANSFERENCIA: $${p.amount.toLocaleString()}\n`;
                    }
                });

                // Si pagó con efectivo, SIEMPRE mostramos el cambio (aunque sea 0)
                const lastPayment = sale.paymentsBreakdown[sale.paymentsBreakdown.length - 1];
                if (lastPayment && lastPayment.method === 'cash') {
                    msg += `*SU CAMBIO: $${(lastPayment.change || 0).toLocaleString()}*\n`;
                }
            } else {
                // Compatibilidad con tickets antiguos
                if (sale.paymentMethod === 'cash') {
                    const pagoCon = sale.total + (sale.change || 0);
                    msg += `💵 PAGÓ CON (Efectivo): $${pagoCon.toLocaleString()}\n`;
                    msg += `*SU CAMBIO: $${(sale.change || 0).toLocaleString()}*\n`;
                } else {
                    msg += `📱 MÉTODO: TRANSFERENCIA\n`;
                }
            }

            msg += `--------------------------------------\n`;
            msg += `¡Gracias por tu preferencia! Vuelve pronto. 👋\n`;
            msg += `Tel. 963-632-0837\n`;

            // 3. Generamos el enlace oficial de WhatsApp
            const encodedMsg = encodeURIComponent(msg);
            const countryCode = "52"; // Código de México
            const finalUrl = `https://wa.me/${countryCode}${cleanPhone}?text=${encodedMsg}`;

            // 4. Al ejecutarse desde un clic de botón directo, Chrome NO lo bloquea
            window.open(finalUrl, '_blank');
            
            showToast('✅ Abriendo WhatsApp...', 'success');
            
            // Regresamos a la pantalla del ticket normal
            showReceipt(sale); 
        }

            currentKitchenTab = tab;

            const pendingOrders = state.orders.filter(o => o.status !== 'delivered' && o.status !== 'cancelled')
                .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            sevenDaysAgo.setHours(0, 0, 0, 0);

            const historyOrders = state.orders.filter(o => {
                const isHistoryStatus = ['delivered', 'ready', 'cancelled'].includes(o.status);
                const isRecent = new Date(o.createdAt) >= sevenDaysAgo;
                return isHistoryStatus && isRecent;
            }).sort((a, b) => new Date(b.statusUpdatedAt || b.createdAt) - new Date(a.statusUpdatedAt || a.createdAt));

            const groupedHistory = {};
            historyOrders.forEach(o => {
                const dateObj = new Date(o.statusUpdatedAt || o.createdAt);
                const dateLabel = dateObj.toLocaleDateString('es-MX', { weekday: 'long', day: '2-digit', month: 'short', year: 'numeric' });
                const sortKey = dateObj.toLocaleDateString('en-CA');

                if (!groupedHistory[sortKey]) {
                    groupedHistory[sortKey] = {
                        label: dateLabel,
                        orders: []
                    };
                }
                groupedHistory[sortKey].orders.push(o);
            });

            const sortedDateKeys = Object.keys(groupedHistory).sort((a, b) => new Date(b) - new Date(a));

            container.innerHTML = `
                <div class="animate-slideIn h-full flex flex-col">
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4 shrink-0">
                        <div class="flex flex-col md:flex-row items-start md:items-center gap-4">
                            <h2 class="text-2xl font-bold flex items-center gap-3 text-theme-greenDark">👨‍🍳 Cocina</h2>
                            
                            <div class="flex bg-white/60 p-1 rounded-xl border border-white">
                                <button onclick="renderKitchen(document.getElementById('contentArea'), 'active')" 
                                    class="${tab === 'active' ? 'bg-theme-green text-white shadow-md' : 'text-theme-textMuted hover:bg-white/50'} px-4 py-2 rounded-lg text-sm transition font-bold">
                                    🔥 Activos (${pendingOrders.length})
                                </button>
                                <button onclick="renderKitchen(document.getElementById('contentArea'), 'history')" 
                                    class="${tab === 'history' ? 'bg-theme-green text-white shadow-md' : 'text-theme-textMuted hover:bg-white/50'} px-4 py-2 rounded-lg text-sm transition font-bold">
                                    📅 Historial Semanal
                                </button>
                            </div>
                        </div>
                        
                        <button onclick="showKitchenReportModal()" class="btn-primary px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm font-bold shadow-md">
                            📝 Reporte del Día
                        </button>
                    </div>

                    <div class="overflow-auto pb-4 scrollbar-thin flex-1 pr-2">
                        ${tab === 'active' ? renderActiveOrders(pendingOrders) : renderWeeklyHistory(groupedHistory, sortedDateKeys)}
                    </div>
                </div>
            `;
        }

        function renderActiveOrders(orders) {
            if (orders.length === 0) return '<div class="h-full flex items-center justify-center"><p class="text-theme-textMuted py-12 text-xl font-medium">🎉 ¡La cocina está al día!</p></div>';

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    ${orders.map(order => renderOrderCard(order, false)).join('')}
                </div>
            `;
        }

        function renderWeeklyHistory(groupedHistory, sortedKeys) {
            if (sortedKeys.length === 0) return '<div class="h-full flex items-center justify-center"><p class="text-theme-textMuted py-12 text-xl font-medium">No hay pedidos registrados en los últimos 7 días.</p></div>';

            return `
                <div class="space-y-8">
                    ${sortedKeys.map(dateKey => `
                        <div class="bg-white/60 rounded-2xl p-5 border border-white animate-slideIn shadow-sm">
                            <h3 class="text-lg font-bold text-theme-greenDark mb-4 border-b border-theme-beige pb-3 capitalize flex items-center gap-3">
                                📅 ${groupedHistory[dateKey].label}
                                <span class="text-xs text-white bg-theme-green px-3 py-1 rounded-full font-bold shadow-sm">
                                    ${groupedHistory[dateKey].orders.length} pedidos
                                </span>
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                ${groupedHistory[dateKey].orders.map(order => renderOrderCard(order, true)).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderOrderCard(order, isHistory) {
            const endTime = order.statusUpdatedAt ? new Date(order.statusUpdatedAt) : new Date();
            const waitTime = Math.floor((endTime - new Date(order.createdAt)) / 60000);

            // 💡 MAGIA: Filtramos los productos para que la cocina NO vea las bebidas
            const kitchenItems = order.items.filter(item => {
                const prod = state.products.find(p => p.id === item.productId);
                if (!prod) return true;
                const cat = prod.category ? prod.category.toLowerCase() : '';
                return cat !== 'drink' && cat !== 'bebidas' && cat !== 'bebida';
            });

            return `
                <div class="bg-white rounded-2xl p-4 flex flex-col border border-white shadow-sm ${isHistory ? 'opacity-80 border-l-4 border-l-green-400 bg-theme-bg' : 'card-hover'} ${!isHistory && waitTime > 15 ? 'border-2 border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : ''} ${!isHistory && waitTime > 10 && waitTime <= 15 ? 'border-2 border-yellow-400' : ''}">
                    <div class="flex items-center justify-between mb-3">
                        <div>
                            <span class="text-xl font-extrabold text-theme-text">#${order.id.toString().slice(-4)}</span>
                            <span class="ml-2 px-2 py-1 rounded-full text-xs font-bold text-white shadow-sm ${order.type === 'table' ? 'bg-purple-400' : 'bg-blue-400'}">
                                ${order.type === 'table' ? `Mesa ${order.tableId}` : 'Mostrador'}
                            </span>
                        </div>
                        <span class="text-xs ${!isHistory && waitTime > 15 ? 'text-red-600 animate-pulse-custom font-extrabold' : !isHistory && waitTime > 10 ? 'text-yellow-600 font-bold' : 'text-theme-textMuted font-medium'}">
                            ⏱️ ${waitTime} min
                        </span>
                    </div>
                    <div class="space-y-2 mb-4 flex-1">
                        ${kitchenItems.length > 0 ? kitchenItems.map(item => `
                            <div class="flex flex-col text-sm p-2 rounded-lg bg-theme-bg border border-theme-beige text-theme-text font-medium">
                                <div><strong class="text-theme-greenDark mr-1">${item.quantity}x</strong> ${item.name}</div>
                                ${item.note ? `<div class="text-xs text-red-600 font-bold mt-1 bg-red-50 p-1 rounded border border-red-100 flex gap-1"><span>⚠️</span> <span>${item.note}</span></div>` : ''}
                            </div>
                        `).join('') : '<p class="text-xs text-blue-600 font-bold text-center py-3 bg-blue-50 rounded-lg border border-blue-200">🥤 Solo bebidas (Barra)</p>'}
                    </div>
                    <div class="flex items-center justify-between mt-auto border-t border-theme-beige pt-3">
                        
                        <div class="flex items-center gap-2">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${getStatusClass(order.status)}">
                                ${getStatusLabel(order.status)}
                            </span>
                            <button onclick="printKitchenTicket(${order.id})" class="p-1.5 bg-gray-100 hover:bg-gray-200 border border-gray-300 text-gray-800 rounded-lg transition shadow-sm" title="Imprimir Comanda">🖨️</button>
                        </div>
                        
                        ${!isHistory ? `
                            <div class="flex gap-2">
                                ${order.status === 'pending' ? `
                                    <button onclick="updateOrderStatus(${order.id}, 'preparing')" class="px-3 py-1.5 rounded-lg bg-blue-500 text-white hover:bg-blue-600 text-sm font-bold transition shadow-sm">
                                        🍳 Preparar
                                    </button>
                                ` : order.status === 'preparing' ? `
                                    <button onclick="updateOrderStatus(${order.id}, 'ready')" class="px-3 py-1.5 rounded-lg bg-green-500 text-white hover:bg-green-600 text-sm font-bold transition shadow-sm">
                                        ✅ Listo
                                    </button>
                                ` : order.status === 'ready' ? `
                                    <button onclick="updateOrderStatus(${order.id}, 'delivered')" class="px-3 py-1.5 rounded-lg bg-purple-500 text-white hover:bg-purple-600 text-sm font-bold transition shadow-sm">
                                        🚀 Entregar
                                    </button>
                                ` : ''}
                            </div>
                        ` : `
                            <span class="text-xs text-theme-textMuted bg-white border border-theme-beige px-2 py-1 rounded-lg font-medium">
                                ✅ ${new Date(order.statusUpdatedAt || order.createdAt).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })}
                            </span>
                        `}
                    </div>
                </div>
            `;
        }
        function updateOrderStatus(orderId, newStatus) {
            const order = state.orders.find(o => o.id === orderId);
            if (!order) return;

            // Actualizamos el estado de la orden
            order.status = newStatus;

            // ❌ ELIMINADO: Ya no se libera la mesa automáticamente al entregar.

            saveToStorage();
            
            const statusText = typeof getStatusLabel === 'function' ? getStatusLabel(newStatus) : newStatus;
            showToast(`✅ Pedido marcado como: ${statusText}`, 'success');

            // RECARGA INTELIGENTE DE PANTALLAS
            const contentArea = document.getElementById('contentArea');
            if (currentUser.role === 'kitchen') {
                if (typeof renderKitchen === 'function') renderKitchen(contentArea);
            } else {
                if (typeof renderWaiter === 'function') renderWaiter(contentArea);
            }
        }
        function showKitchenReportModal() {
            const today = new Date().toDateString();
            const todayOrders = state.orders.filter(o => new Date(o.createdAt).toDateString() === today && o.status !== 'cancelled');

            const productCounts = {};
            todayOrders.forEach(order => {
                order.items.forEach(item => {
                    if (!productCounts[item.name]) productCounts[item.name] = 0;
                    productCounts[item.name] += item.quantity;
                });
            });

            const productsSummary = Object.entries(productCounts).sort((a, b) => b[1] - a[1]);
            const totalItems = productsSummary.reduce((sum, [_, qty]) => sum + qty, 0);

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-lg animate-slideIn flex flex-col max-h-[90vh] shadow-2xl border-2 border-white">
                    <div class="flex items-center justify-between mb-4 pb-2 border-b border-theme-beige">
                        <h3 class="text-xl font-bold flex items-center gap-2 text-theme-greenDark">📊 Reporte de Cocina</h3>
                        <button onclick="closeModal()" class="p-2 bg-white rounded-lg transition text-theme-textMuted hover:bg-theme-beige border border-theme-beige">✕</button>
                    </div>
                    
                    <div class="overflow-y-auto flex-1 scrollbar-thin pr-2 space-y-5 mb-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl text-center shadow-sm">
                                <p class="text-blue-700 text-sm mb-1 font-medium">Pedidos Atendidos</p>
                                <p class="text-4xl font-extrabold text-blue-600">${todayOrders.length}</p>
                            </div>
                            <div class="bg-green-50 border border-green-200 p-4 rounded-xl text-center shadow-sm">
                                <p class="text-green-700 text-sm mb-1 font-medium">Items Preparados</p>
                                <p class="text-4xl font-extrabold text-green-600">${totalItems}</p>
                            </div>
                        </div>

                        <div>
                            <h4 class="font-bold text-theme-greenDark mb-3 flex items-center gap-2">
                                 Desglose de Producción
                            </h4>
                            <div class="space-y-2 max-h-48 overflow-y-auto scrollbar-thin pr-2 bg-white border border-theme-beige p-3 rounded-xl shadow-inner">
                                ${productsSummary.length > 0 ? productsSummary.map(([name, qty]) => `
                                    <div class="flex justify-between items-center py-2 border-b border-theme-beige last:border-0">
                                        <span class="text-sm font-medium text-theme-text">${name}</span>
                                        <span class="font-bold bg-theme-bg border border-theme-beige px-3 py-1 rounded-lg text-sm text-theme-greenDark">${qty}</span>
                                    </div>
                                `).join('') : '<p class="text-theme-textMuted text-center py-4 text-sm font-medium">No se han preparado productos hoy.</p>'}
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-theme-text mb-2">Notas para Administración (Opcional)</label>
                            <textarea id="kitchenNotes" rows="3" class="w-full px-4 py-3 bg-white border border-theme-beige rounded-xl focus:outline-none focus:border-theme-green transition resize-none text-sm text-theme-text shadow-sm" placeholder="Ej. Hubo escasez de queso, la masa tardó en leudar..."></textarea>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-4 shrink-0 border-t border-theme-beige">
                        <button onclick="closeModal()" class="py-3.5 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-bold text-theme-text">Cancelar</button>
                        <button onclick="sendKitchenReport()" class="btn-primary py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md" ${todayOrders.length === 0 ? 'disabled' : ''}>
                            📤 Enviar Cierre
                        </button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function sendKitchenReport() {
            const notes = document.getElementById('kitchenNotes').value.trim();
            const today = new Date().toDateString();
            const todayOrders = state.orders.filter(o => new Date(o.createdAt).toDateString() === today && o.status !== 'cancelled');

            if (!state.kitchenReports) state.kitchenReports = [];

            const report = {
                id: Date.now(),
                date: new Date().toISOString(),
                createdBy: currentUser.id,
                createdByName: currentUser.name,
                totalOrders: todayOrders.length,
                notes: notes
            };

            state.kitchenReports.push(report);

            addNotification('info', `👨‍🍳 Reporte de cocina enviado por ${currentUser.name}. Pedidos: ${todayOrders.length}. ${notes ? '⚠️ Tiene notas.' : ''}`, ['admin']);
            logActivity('KITCHEN_REPORT', `Reporte de cierre de cocina enviado. ${todayOrders.length} pedidos. Notas: ${notes || 'Ninguna'}`);

            saveToStorage();
            showToast('Reporte enviado correctamente a administración', 'success');
            closeModal();
        }

        // ==================== WAITER MODULE (VISUAL FLOOR PLAN MOBILE-FIRST) ====================
        function renderWaiter(container) {
            // Asegurarnos de que las mesas lean las variables de Porcentaje (xP, yP)
            state.tables.forEach((t, i) => {
                if (t.xP === undefined) t.xP = (i % 3) * 30 + 15;
                if (t.yP === undefined) t.yP = Math.floor(i / 3) * 20 + 15;
            });

            container.innerHTML = `
                <div class="animate-slideIn h-full flex flex-col">
                    <div class="flex justify-between items-center mb-3 shrink-0">
                        <h2 class="text-xl md:text-2xl font-bold flex items-center gap-2 text-theme-greenDark">🍽️ Plano de Mesas</h2>
                        <span class="bg-white px-3 py-1 rounded-lg text-[10px] md:text-xs font-bold text-theme-textMuted border border-theme-beige shadow-sm">
                            ${state.tables.length} mesas
                        </span>
                    </div>
                    
                    <div class="flex-1 w-full glass rounded-2xl md:rounded-3xl border border-white shadow-sm p-1.5 md:p-4 bg-[#f8fafc] flex flex-col min-h-0">
                        <div class="flex-1 w-full relative bg-white/80 rounded-xl md:rounded-2xl shadow-inner border border-gray-300 overflow-hidden" id="waiterFloorPlan">
                            
                            <div class="absolute top-0 left-1/2 -translate-x-1/2 bg-gray-300 text-gray-600 px-4 md:px-6 py-1 rounded-b-lg font-bold text-[9px] md:text-xs uppercase tracking-wider z-0">Cocina / Barra</div>

                            ${state.tables.map(table => {
                                // Buscamos orden sin pagar
                                const activeOrder = state.orders.find(o => o.tableId === table.id && o.paymentStatus !== 'paid' && o.status !== 'cancelled');
                                
                                let bgColor = 'bg-green-50 border-green-400 hover:bg-green-100'; // Libre
                                let textColor = 'text-green-700';
                                let pulseEffect = '';
                                let badgeHtml = '';
                                
                                if (table.status !== 'free') {
                                    if (activeOrder) {
                                        if (activeOrder.status === 'ready') {
                                            bgColor = 'bg-blue-100 border-blue-500';
                                            textColor = 'text-blue-800';
                                            pulseEffect = 'shadow-[0_0_15px_rgba(59,130,246,0.6)] animate-pulse-custom';
                                        } else {
                                            bgColor = 'bg-orange-50 border-orange-400 hover:bg-orange-100';
                                            textColor = 'text-orange-800';
                                        }
                                        badgeHtml = `<span class="px-1.5 md:px-2.5 py-0.5 rounded-full text-[8px] md:text-[10px] font-black bg-white/95 ${textColor} shadow-sm border border-white text-center leading-tight truncate w-14 sm:w-16 md:w-auto">${getStatusLabel(activeOrder.status)}</span>`;
                                    } else {
                                        // Ocupada pero la cuenta ya está pagada -> Lista para limpiar
                                        bgColor = 'bg-gray-200 border-gray-400 hover:bg-gray-300';
                                        textColor = 'text-gray-600';
                                        badgeHtml = `<span class="px-1.5 md:px-2.5 py-0.5 rounded-full text-[8px] md:text-[10px] font-black bg-white/95 ${textColor} shadow-sm border border-white text-center leading-tight truncate w-14 sm:w-16 md:w-auto">POR LIMPIAR</span>`;
                                    }
                                } else {
                                    badgeHtml = `<span class="md:hidden text-[9px] opacity-70 font-bold ${textColor}">${table.capacity} p.</span>`;
                                }

                                return `
                                    <div onclick="selectTable(${table.id})" 
                                        class="absolute w-16 h-16 sm:w-20 sm:h-20 md:w-28 md:h-28 rounded-full border-2 md:border-4 flex flex-col items-center justify-center cursor-pointer transition-transform duration-200 hover:scale-105 shadow-md ${bgColor} ${pulseEffect}"
                                        style="left: ${table.xP}%; top: ${table.yP}%; transform: translate(-50%, -50%); z-10;">
                                        
                                        <span class="font-black text-sm sm:text-base md:text-xl ${textColor} leading-none mb-0.5 text-center px-1 truncate w-full">${table.name}</span>

                                        ${badgeHtml}
                                        
                                        <button onclick="confirmDeleteTable(${table.id})" class="delete-btn absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-8 h-8 md:w-8 md:h-8 text-xs font-bold shadow-md hover:bg-red-600 flex items-center justify-center z-10 transition-transform hover:scale-110">🗑️</button>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== VARIABLE GLOBAL PARA EL CARRITO MÓVIL ====================
        window.isMobileCartOpen = false;

        function toggleMobileCart() {
            const panel = document.getElementById('tableCartPanel');
            if (!panel) return;
            
            // Leemos la pantalla directamente: Si tiene la clase 'translate-y-full' es porque está oculto abajo.
            if (panel.classList.contains('translate-y-full')) {
                // Entonces lo subimos
                window.isMobileCartOpen = true;
                panel.classList.remove('translate-y-full');
                panel.classList.add('translate-y-0');
            } else {
                // Si no la tiene, es porque está arriba, así que lo bajamos
                window.isMobileCartOpen = false;
                panel.classList.remove('translate-y-0');
                panel.classList.add('translate-y-full');
            }
        }

        // ==================== MÓDULO DE MESAS Y COMANDAS (ADAPTADO A MÓVILES) ====================
        function selectTable(tableId, keepCartOpen = false) {
            window.isMobileCartOpen = keepCartOpen; 
            selectedTable = tableId;
            const table = state.tables.find(t => t.id === tableId);
            
            // MAGIA: Ahora la orden sigue viva hasta que la PAGUEN (no cuando la entreguen)
            const activeOrder = state.orders.find(o => o.tableId === tableId && o.paymentStatus !== 'paid' && o.status !== 'cancelled');

            initProductCategories();
            const categories = [{ id: 'all', name: 'Todo', icon: '🍽️' }, ...state.productCategories];

            const totalCartAmount = calculateCartTotal();
            const totalItemsInCart = currentCart.reduce((sum, item) => sum + item.quantity, 0);

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-3 md:p-6 w-[98%] max-w-6xl animate-slideIn h-[95vh] md:h-[90vh] flex flex-col shadow-2xl border-2 border-white overflow-hidden relative">
                    
                    <div class="flex items-center justify-between mb-3 border-b border-theme-beige pb-2 shrink-0 px-1">
                        <div class="flex items-center gap-3">
                            <h3 class="text-xl font-bold flex items-center gap-2 text-theme-greenDark">🍽️ ${table.name}</h3>
                            ${table.status !== 'free' ? `<button onclick="freeTable(${table.id})" class="px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 rounded-lg text-xs font-bold transition shadow-sm flex items-center gap-1">🧹 Desocupar</button>` : ''}
                        </div>
                        <button onclick="window.isMobileCartOpen=false; closeModal()" class="p-2 bg-white rounded-lg transition text-theme-textMuted hover:bg-theme-beige border border-theme-beige font-bold shadow-sm">✕</button>
                    </div>

                    ${activeOrder ? `
                        <div class="mb-3 p-3 rounded-xl bg-theme-bg border border-theme-beige shadow-inner shrink-0">
                            <div class="flex justify-between items-center cursor-pointer" onclick="document.getElementById('activeOrderDetails').classList.toggle('hidden')">
                                <h4 class="font-bold text-theme-text flex items-center gap-2 text-sm md:text-base">🛒 Pedido Actual #${activeOrder.id.toString().slice(-4)} <span class="text-[10px] text-blue-500 bg-blue-100 px-2 py-0.5 rounded">(Toca para expandir)</span></h4>
                                <span class="px-2 py-1 rounded-full text-[10px] font-bold shadow-sm ${getStatusClass(activeOrder.status)}">${getStatusLabel(activeOrder.status)}</span>
                            </div>
                            <div id="activeOrderDetails" class="hidden mt-3 pt-3 border-t border-theme-beige">
                                <div class="space-y-2 mb-2 max-h-24 overflow-y-auto scrollbar-thin pr-2">
                                    ${activeOrder.items.map(item => `
                                        <div class="flex flex-col text-sm font-medium border-b border-white pb-1">
                                            <div class="flex justify-between">
                                                <span><strong class="text-theme-greenDark">${item.quantity}x</strong> ${item.name}</span>
                                                <span class="font-bold">$${(item.price * item.quantity).toLocaleString()}</span>
                                            </div>
                                            ${item.note ? `<span class="text-xs text-red-500 italic mt-0.5">Nota: ${item.note}</span>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                              <div class="flex justify-between font-extrabold border-t border-theme-beige pt-2 text-theme-greenDark text-sm">
                                    <span>Total consumido:</span>
                                    <span>$${activeOrder.total.toLocaleString()}</span>
                                </div>
                                <button onclick="printPreCheck(${activeOrder.id})" class="mt-3 w-full py-2 bg-gray-200 hover:bg-gray-300 text-black font-bold rounded-lg shadow-sm border border-gray-400 flex justify-center items-center gap-2 transition">
                                    🖨️ Imprimir Pre-Cuenta
                                </button>
                            </div>
                        </div>
                    ` : ''}

                    <div class="flex gap-4 flex-col lg:flex-row flex-1 min-h-0 min-w-0 pb-1 w-full overflow-hidden">

        // ==================== MOTORES DE RENDERIZADO DEL MENÚ DE MESAS ====================
        function renderTableProductsHTML(tableId, category) {
            const filtered = category === 'all'
                ? state.products.filter(p => p.active)
                : state.products.filter(p => p.active && p.category === category);

            return filtered.map(p => {
                const categoryIcons = { pizza: '🍕', drink: '🥤', extra: '🍟', promo: '🎉' };
                const available = hasEnoughStock(p);
                
                const imageHtml = p.image 
                    ? `<img src="${p.image}" class="w-12 h-12 md:w-16 md:h-16 object-cover rounded-xl mb-1 shadow-sm ${!available ? 'grayscale opacity-50' : ''}">` 
                    : `<span class="text-3xl drop-shadow-sm ${!available ? 'grayscale opacity-50' : ''}">${p.icon || categoryIcons[p.category] || '🍽️'}</span>`;
                
                const priceHTML = (p.sizes && p.sizes.length > 0) 
                    ? `<p class="${!available ? 'text-red-600' : 'text-[#F3A70D]'} font-extrabold text-sm mt-0.5"><span class="text-[9px] text-theme-textMuted uppercase">Desde</span> $${Math.min(...p.sizes.map(s => s.price))}</p>`
                    : `<p class="${!available ? 'text-red-600' : 'text-[#F3A70D]'} font-extrabold text-sm mt-0.5">$${p.price}</p>`;

                return `
                    <div ${available ? `onclick="handleProductClick(${p.id}, ${tableId})"` : ''} 
                        class="p-2 md:p-3 rounded-xl ${available ? 'bg-white border-theme-beige hover:border-theme-green cursor-pointer' : 'bg-red-50 border-red-300 opacity-70 cursor-not-allowed'} border-2 shadow-sm transition text-center flex flex-col items-center justify-between gap-1 relative overflow-hidden min-h-[120px]">
                        
                        ${!available ? '<div class="absolute top-0 w-full bg-red-500 text-white text-[9px] font-extrabold py-0.5 tracking-wider z-10">AGOTADO</div>' : ''}
                        ${imageHtml}
                        <div class="w-full">
                            <p class="text-[11px] md:text-xs font-bold ${!available ? 'text-red-800' : 'text-theme-text'} leading-tight line-clamp-2">${p.name}</p>
                            ${priceHTML}
                        </div>
                    </div>
                `;
            }).join('') || '<p class="col-span-full text-center text-theme-textMuted py-8 text-sm">No hay productos en esta categoría</p>';
        }
        function filterTableProducts(tableId, category) {
            currentTableCategory = category;
            
            document.querySelectorAll('[id^="table-cat-"]').forEach(btn => {
                btn.className = 'px-3 py-1.5 md:py-2 rounded-xl text-[11px] md:text-xs transition font-bold border border-white whitespace-nowrap shrink-0 bg-white/60 hover:bg-white/90 text-theme-textMuted';
            });
            
            const activeBtn = document.getElementById(`table-cat-${category}`);
            if (activeBtn) {
                activeBtn.className = 'px-3 py-1.5 md:py-2 rounded-xl text-[11px] md:text-xs transition font-bold border border-white whitespace-nowrap shrink-0 bg-theme-green text-white shadow-md hover:bg-theme-greenDark';
            }

            // 🛡️ LÓGICA BLINDADA CON TAILWIND (MESEROS)
            const containerHalf = document.getElementById('btn-half-table-container');
            if (containerHalf) {
                let showBtn = false;
                if (category === 'all') {
                    showBtn = state.productCategories.some(c => c.allowHalfAndHalf === true);
                } else {
                    const catObj = state.productCategories.find(c => c.id === category);
                    showBtn = catObj ? catObj.allowHalfAndHalf === true : false;
                }
                
                if (showBtn) {
                    containerHalf.classList.remove('hidden');
                    containerHalf.classList.add('flex');
                } else {
                    containerHalf.classList.remove('flex');
                    containerHalf.classList.add('hidden');
                }
            }

            document.getElementById('tableProductsContainer').innerHTML = renderTableProductsHTML(tableId, category);
        }

        function sendTableOrder(tableId) {
            try {
                if (currentCart.length === 0) {
                    showToast('Agrega al menos un producto', 'warning');
                    return;
                }
                const table = state.tables.find(t => t.id === tableId);
                
                // 💡 SOLUCIÓN: Buscamos cualquier orden activa (Sin pagar ni cancelar)
                // Ya no excluimos las 'delivered', para que los postres/extras se sumen a la misma cuenta
                let order = state.orders.find(o => o.tableId === tableId && o.paymentStatus !== 'paid' && o.status !== 'cancelled');
                
                if (!order) {
                    order = {
                        id: Date.now(),
                        type: 'table',
                        tableId: tableId,
                        tableName: table.name,
                        createdBy: currentUser.id,
                        createdAt: new Date().toISOString(),
                        userId: currentUser.id,
                        userName: currentUser.name,
                        waiterId: currentUser.id, 
                        waiterName: currentUser.name,
                        items: [],
                        status: 'pending',
                        total: 0,
                        timestamp: new Date().toISOString()
                    };
                    state.orders.push(order);
                } else {
                    // 💡 MAGIA: Si el ticket ya había sido entregado, lo "revivimos" 
                    // regresándolo a Pendiente para que la cocina prepare lo nuevo que pidieron
                    if (order.status === 'delivered' || order.status === 'ready') {
                        order.status = 'pending';
                        order.createdAt = new Date().toISOString(); // Reinicia el cronómetro en la pantalla de cocina
                    }
                }

                currentCart.forEach(cartItem => {
                    // 1. Agregar el producto a la cuenta de la mesa
                    const existing = order.items.find(i => i.productId === cartItem.productId && i.note === cartItem.note); 
                    if (existing) {
                        existing.quantity += cartItem.quantity;
                    } else {
                        order.items.push({ ...cartItem });
                    }

                    // 2. Descontar del inventario real en este momento
                    const product = state.products.find(p => p.id === cartItem.productId);
                    if (product && product.ingredients) {
                        product.ingredients.forEach(ing => {
                            const invItem = state.inventory.find(i => i.id === ing.id);
                            if (invItem) {
                                invItem.stock -= (ing.qty * cartItem.quantity);
                                if (invItem.stock <= invItem.minStock) {
                                    try { addNotification('warning', `⚠️ Stock bajo: ${invItem.name}`, ['admin', 'cashier']); } catch(e){}
                                }
                            }
                        });
                    }
                });

                checkProductAvailability();

                // Actualizar total de la mesa y bloquearla
                order.total = order.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                table.status = 'occupied';

                try {
                    if (typeof addNotification === 'function') addNotification(`Nueva comanda de ${table.name}`, ['cocina', 'admin']);
                } catch(e) {}

                currentCart = [];
                window.isMobileCartOpen = false; // Cerramos el carrito en el celular después de enviar
                saveToStorage();
                
                showToast('✅ Orden enviada a cocina e Inventario actualizado', 'success');

                const modal = document.getElementById('modalContainer');
                if (modal) {
                    modal.classList.add('hidden');
                    modal.innerHTML = ''; 
                }
                
                const contentArea = document.getElementById('contentArea');
                if (typeof renderWaiter === 'function') renderWaiter(contentArea);
                
            } catch (error) {
                console.error("Error al enviar a cocina:", error);
                showToast('❌ Error al procesar: ' + error.message, 'error');
            }
        }

        function clearMyOrders() {
            let cleanedCount = 0;

            state.orders.forEach(o => {
                // Solo revisamos los de este mesero
                if (o.createdBy === currentUser.id && !o.hiddenFromWaiter) {
                    // Condición de seguridad: Solo limpiar los que ya terminaron su ciclo
                    if (o.status === 'delivered' || o.status === 'cancelled' || o.paymentStatus === 'paid') {
                        o.hiddenFromWaiter = true; // Se marca como oculto
                        cleanedCount++;
                    }
                }
            });
            
            saveToStorage();
            closeModal();
            renderMyOrders(document.getElementById('contentArea')); // Recargamos la vista
            
            if (cleanedCount > 0) {
                showToast(`✅ Se limpiaron ${cleanedCount} pedidos terminados`, 'success');

            }
        }

        // ==================== CALCULADORA INTELIGENTE DE INVENTARIO ====================
        function calculateInvCost(source) {
            const stockInput = document.getElementById('invStock');
            const unitCostInput = document.getElementById('invCost');
            const totalCostInput = document.getElementById('invTotalCost');

            if (!stockInput || !unitCostInput || !totalCostInput) return;

            const stock = parseFloat(stockInput.value) || 0;

            if (source === 'unit' || source === 'stock') {
                // Si cambiamos el stock o el precio unitario, calculamos el Precio Final
                const unit = parseFloat(unitCostInput.value) || 0;
                if (stock > 0) {
                    totalCostInput.value = (unit * stock).toFixed(2);
                } else {
                    totalCostInput.value = '';
                }
            } else if (source === 'total') {
                // Si escribimos el Precio Final del bulto/paquete, calculamos el Costo Unitario
                const total = parseFloat(totalCostInput.value) || 0;
                if (stock > 0) {
                    unitCostInput.value = (total / stock).toFixed(2);
                } else {
                    unitCostInput.value = '';
                }
            }
        }

        function saveInventoryItem(itemId) {
            try {
                const name = document.getElementById('invName').value.trim();
                const unit = document.getElementById('invUnit').value;
                const minStock = parseFloat(document.getElementById('invMinStock').value) || 0;
                const stock = parseFloat(document.getElementById('invStock').value) || 0;
                const cost = parseFloat(document.getElementById('invCost').value) || 0;

                const categoryEl = document.getElementById('invCategory');
                const category = categoryEl ? categoryEl.value : 'Ingredientes';

                if (!name) {
                    showToast('⚠️ Por favor ingresa el nombre del insumo', 'warning');
                    return;
                }

                // 💡 AUTOLIMPIEZA: Arreglar insumos "trabados" con texto 'inv_' para que los botones vuelvan a funcionar
                state.inventory = state.inventory.map(item => {
                    if (typeof item.id === 'string' && item.id.startsWith('inv_')) {
                        return { ...item, id: parseInt(item.id.replace('inv_', '')) || Date.now() };
                    }
                    return item;
                });

                if (itemId) {
                    // 💡 CORRECCIÓN: Usamos == para encontrarlo sin fallos
                    const index = state.inventory.findIndex(i => i.id == itemId);
                    if (index !== -1) {
                        state.inventory[index] = { 
                            ...state.inventory[index], 
                            name, category, unit, minStock, stock, cost 
                        };
                        showToast('✅ Insumo actualizado correctamente', 'success');
                    }
                } else {
                    // 💡 CORRECCIÓN: Volvemos a generar el ID como número puro, sin texto
                    const newItem = {
                        id: Date.now(),
                        name,
                        category,
                        unit,
                        minStock,
                        stock,
                        cost
                    };
                    state.inventory.push(newItem);
                    showToast('✅ Nuevo insumo agregado', 'success');
                }

                saveToStorage();
                closeModal();
                
                const contentArea = document.getElementById('contentArea');
                if (typeof renderInventory === 'function') {
                    renderInventory(contentArea);
                }
                
            } catch (error) {
                console.error("Error al guardar el insumo:", error);
                showToast('Error interno al guardar', 'error');
            }
        }

// ==================== CONVERTIDOR DE IMAGEN CON SÚPER COMPRESIÓN ====================
function convertImageToBase64(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // 💡 MAGIA: Reducimos la resolución drásticamente.
                        // 120x120 es más que suficiente para los botones del POS y pesa 10 veces menos.
                        const MAX_WIDTH = 120;
                        const MAX_HEIGHT = 120;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        
                        ctx.drawImage(img, 0, 0, width, height);

                        // 💡 SÚPER COMPRESIÓN: Calidad al 50% (0.5) en formato JPEG (elimina fondos transparentes pesados)
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
                        
                        document.getElementById('hiddenImageBase64').value = compressedBase64;
                        showToast('✅ Foto optimizada al máximo', 'success');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function updateProduct(productId) {
            try {
                const product = state.products.find(p => String(p.id) === String(productId));
                if (!product) return;

                product.name = document.getElementById('editProdName').value.trim();
                product.category = document.getElementById('editProdCategory').value;
                product.price = parseFloat(document.getElementById('editProdPrice').value) || product.price;

                const hiddenImgInput = document.getElementById('hiddenImageBase64');
                const urlInput = document.getElementById('editProdImageUrl');
                const imageBase64 = hiddenImgInput ? hiddenImgInput.value : '';
                const imageUrl = urlInput ? urlInput.value.trim() : '';
                
                if (imageBase64) product.image = imageBase64;
                else if (imageUrl) product.image = imageUrl;
                
                // Guardamos los arrays de receta y tamaños
                product.ingredients = JSON.parse(JSON.stringify(currentEditIngredients));
                product.sizes = JSON.parse(JSON.stringify(currentEditSizes));

                saveToStorage(); 
                if (typeof syncMenuToBranches === 'function') syncMenuToBranches();
                
                // Limpiamos memoria temporal
                currentEditIngredients = []; 
                currentEditSizes = [];
                if (hiddenImgInput) hiddenImgInput.value = ''; 

                showToast('✅ Producto y tamaños actualizados', 'success'); 
                closeModal(); 
                renderProducts(document.getElementById('contentArea'));

            } catch (error) {
                console.error("Error al guardar el producto:", error);
                showToast('❌ Error al guardar: ' + error.message, 'error');
            }
        }

        function deleteProduct(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            // 1. Filtrar (eliminar) el producto del estado
            state.products = state.products.filter(p => p.id !== productId);
            
            // 2. Registrar la acción
            logActivity('PRODUCT_DELETE', `Producto eliminado permanentemente: ${product.name}`);
            
            // 3. Guardar en base de datos y sincronizar con sucursales si aplica
            saveToStorage();
            if (typeof syncMenuToBranches === 'function') syncMenuToBranches();
            
            // 4. Mostrar mensaje y recargar la vista
            showToast(`Producto ${product.name} eliminado`, 'success');
            closeModal();
            renderProducts(document.getElementById('contentArea'));
        }

        function updateUser(userId) {
            const user = state.users.find(u => u.id === userId);
            const newName = document.getElementById('editUserName').value.trim();
            const newUsername = document.getElementById('editUserUsername').value.trim().toLowerCase();
            const newPassword = document.getElementById('editUserPassword').value;

            if (!newName || !newUsername) {
                showToast('El nombre y el usuario no pueden estar vacíos', 'warning');
                return;
            }

            if (state.users.some(u => u.username === newUsername && u.id !== userId)) {
                showToast('El nombre de usuario ya está en uso', 'error');
                return;
            }

            user.name = newName;
            user.username = newUsername;

            if (newPassword) {
                user.password = newPassword;
            }

            if (user.id !== currentUser.id) {
                user.role = document.getElementById('editUserRole').value;
            }

            if (user.id === currentUser.id) {
                currentUser = { ...user };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('userName').textContent = currentUser.name;
            }

            logActivity('USER_UPDATE', `Usuario actualizado: ${user.name}`);
            saveToStorage();
            showToast('Usuario actualizado', 'success');
            closeModal();
            renderUsers(document.getElementById('contentArea'));
        }

        
        // ==================== CASH REGISTER MODULE ====================
        function renderCashRegister(container) {
            const cr = state.cashRegister;
            
            // 🛡️ Lógica de Fechas (Idéntica a la de Pedidos para evitar desfases de horario)
            const getLocalYYYYMMDD = (dateObj) => {
                const d = new Date(dateObj);
                if (isNaN(d)) return "";
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            };

            const todayLocalStr = getLocalYYYYMMDD(new Date());

            if (typeof window.selectedCashDate === 'undefined' || !window.selectedCashDate) {
                window.selectedCashDate = todayLocalStr; 
            }

            const targetDateStr = window.selectedCashDate;
            const isToday = targetDateStr === todayLocalStr;

            // Filtramos los movimientos por el día seleccionado en el calendario
            const filteredMovements = (cr.movements || []).filter(m => {
                if (!m.timestamp) return false;
                return getLocalYYYYMMDD(m.timestamp) === targetDateStr;
            });
            
            // Sumas de ingresos y egresos de ese día específico
            const cashSales = filteredMovements.filter(m => m.type === 'sale' && m.paymentMethod === 'cash').reduce((sum, m) => sum + m.amount, 0);
            const transferSales = filteredMovements.filter(m => m.type === 'sale' && m.paymentMethod === 'transfer').reduce((sum, m) => sum + m.amount, 0);
            const totalExpenses = filteredMovements.filter(m => m.type === 'expense').reduce((sum, m) => sum + Math.abs(m.amount), 0);

            // Buscamos cuánto fue el fondo inicial de ESE día
            const openMovement = filteredMovements.find(m => m.type === 'open');
            const dayInitialAmount = openMovement ? openMovement.amount : (isToday ? cr.initialAmount : 0);

            container.innerHTML = `

                                </button>
                            ` : ''}

                        <div class="glass bg-white/60 rounded-2xl p-6 border border-white shadow-sm h-fit">
                            <div class="flex items-center justify-between mb-6 pb-4 border-b border-theme-beige">
                                <h3 class="font-extrabold text-lg text-theme-text">${isToday ? 'Estado de Caja' : 'Resumen del Día'}</h3>
                                ${isToday ? `
                                    <span class="px-4 py-2 rounded-full ${cr.isOpen ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} font-bold shadow-sm">

        function openCashRegister() {
            const amount = parseFloat(document.getElementById('initialAmount').value) || 0;
            
            state.cashRegister = {
                isOpen: true,
                openedBy: currentUser.id,
                openedAt: new Date().toISOString(),
                initialAmount: amount,
                movements: [{
                    type: 'open',
                    amount: amount,
                    timestamp: new Date().toISOString(),
                    description: 'Apertura de caja'
                }]
            };

            logActivity('CASH_OPEN', `Caja abierta con fondo de $${amount}`);
